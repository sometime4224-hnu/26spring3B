<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중</title>
  <style>
    body { font-family: "Noto Sans KR", sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #0f172a; }
    .card { width: min(680px, 92vw); background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 28px; box-shadow: 0 16px 40px rgba(15,23,42,0.08); }
    h1 { margin-top: 0; font-size: 1.5rem; }
    p { line-height: 1.7; color: #334155; }
    a { display: inline-block; margin-top: 14px; text-decoration: none; color: #fff; background: #2563eb; padding: 10px 14px; border-radius: 10px; }
  </style>
    <link rel="stylesheet" href="../assets/content-consistency.css">
</head>
<body>
  <main class="card">
    <h1>이 페이지는 준비 중입니다.</h1>
    <p>현재 학습 자료를 정리하는 과정에서 임시로 비어 있습니다. 챕터 메인 페이지에서 다른 학습 콘텐츠를 먼저 이용해 주세요.</p>
    <a href="index.html">챕터 메인으로 돌아가기</a>
  </main>
</body>
</html>
