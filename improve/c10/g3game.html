<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>유학생 입장 심사 게임</title>
  <style>
    :root {
      --bg: #efe5d2;
      --panel: #ddd1b8;
      --panel-soft: #f8f1e4;
      --panel-dark: #b49e78;
      --ink: #2b2217;
      --accent: #7a2e1f;
      --green: #2e7d32;
      --red: #b3261e;
      --line: #6a5a43;
      --shadow: rgba(0,0,0,0.16);
      --radius: 14px;
    }* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: "Noto Sans KR", system-ui, -apple-system, Segoe UI, sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
}

.app {
  width: min(100vw, 430px);
  height: 100dvh;
  background: linear-gradient(180deg, #e8dfcf 0%, #f7f2e9 100%);
  display: grid;
  grid-template-rows: auto auto 1fr auto auto;
  padding: 8px;
  gap: 8px;
  overflow: hidden;
}

.titlebar,
.rule-panel,
.npc-card,
.desk,
.history-sheet,
.footer-bar {
  border: 3px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 0 3px 0 var(--line), 0 6px 10px var(--shadow);
}

.titlebar {
  background: var(--accent);
  color: #fff7ea;
  padding: 10px 12px;
}

.titlebar h1 {
  margin: 0;
  font-size: 1rem;
  line-height: 1.2;
}

.titlebar p {
  margin: 4px 0 0;
  font-size: 0.74rem;
  opacity: 0.96;
  line-height: 1.35;
}

.rule-panel {
  background: var(--panel);
  padding: 8px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: stretch;
  min-height: 92px;
}

.subhead {
  font-size: 0.68rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: #5a452e;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.rule-box {
  background: var(--panel-soft);
  border: 2px dashed var(--line);
  border-radius: 10px;
  padding: 8px 10px;
  min-height: 70px;
  font-size: 0.92rem;
  font-weight: 800;
  line-height: 1.45;
  display: flex;
  align-items: center;
}

.mini-stats {
  width: 100px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
}

.mini-stat {
  background: #f9f3e8;
  border: 2px solid var(--line);
  border-radius: 10px;
  padding: 6px;
  text-align: center;
}

.mini-stat .label {
  font-size: 0.62rem;
  color: #6c583c;
  font-weight: 800;
  margin-bottom: 2px;
}

.mini-stat .value {
  font-size: 1rem;
  font-weight: 900;
  line-height: 1.1;
}

.main-zone {
  min-height: 0;
  display: grid;
  grid-template-rows: 1fr 1.18fr;
  gap: 8px;
  overflow: hidden;
}

.npc-card {
  background: #efe3ca;
  padding: 8px;
  display: grid;
  grid-template-columns: 92px 1fr;
  gap: 8px;
  align-items: center;
  min-height: 0;
}

.npc-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.npc-face {
  width: 82px;
  height: 82px;
  border-radius: 14px;
  background: #fff5e5;
  border: 3px solid var(--line);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.hair, .eye, .mouth, .body {
  position: absolute;
}

.hair {
  top: 6px;
  left: 10px;
  width: 58px;
  height: 28px;
  background: #4b3521;
  border-radius: 20px 20px 8px 8px;
}

.eye {
  top: 34px;
  width: 9px;
  height: 9px;
  background: #2c2115;
  border-radius: 50%;
}

.eye.left { left: 22px; }
.eye.right { right: 22px; }

.mouth {
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 8px;
  border-bottom: 3px solid #7a2e1f;
  border-radius: 0 0 16px 16px;
}

.body {
  left: 12px;
  right: 12px;
  bottom: -20px;
  height: 38px;
  background: #7b8fb8;
  border-radius: 12px 12px 0 0;
  border: 3px solid var(--line);
}

.npc-name {
  text-align: center;
  font-weight: 900;
  font-size: 0.88rem;
  line-height: 1.15;
  word-break: keep-all;
}

.npc-right {
  min-width: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 6px;
  min-height: 0;
}

.speech {
  background: #fffaf0;
  border: 3px solid var(--line);
  border-radius: 12px;
  padding: 10px;
  line-height: 1.5;
  font-size: 1rem;
  font-weight: 800;
  min-height: 86px;
  display: flex;
  align-items: center;
  word-break: keep-all;
}

.tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  background: #f7ead0;
  border: 2px solid var(--line);
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 0.72rem;
  font-weight: 800;
  line-height: 1.1;
}

.desk {
  background: #ece0c7;
  padding: 8px;
  display: grid;
  grid-template-rows: auto auto auto 1fr;
  gap: 8px;
  min-height: 0;
  overflow: hidden;
}

.question-card,
.memo,
.feedback {
  background: #fff8ea;
  border: 3px solid var(--line);
  border-radius: 12px;
  padding: 8px 10px;
}

.question-card h2 {
  margin: 0 0 6px;
  font-size: 0.9rem;
}

.question-line {
  background: #f4ead7;
  border-left: 5px solid var(--accent);
  border-radius: 8px;
  padding: 8px;
  line-height: 1.45;
  font-size: 0.92rem;
  font-weight: 800;
  word-break: keep-all;
}

.memo {
  background: #fef6cf;
  border-style: dashed;
  border-color: #9a7a1f;
  font-size: 0.78rem;
  line-height: 1.45;
  padding: 8px;
}

.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  border: 3px solid var(--line);
  border-radius: 12px;
  padding: 12px 10px;
  font-size: 0.95rem;
  font-weight: 900;
  cursor: pointer;
  background: #fff8ea;
  color: var(--ink);
  box-shadow: 0 3px 0 var(--line);
  transition: transform 0.04s ease, filter 0.15s ease;
  min-height: 52px;
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--line);
}

button.pass { background: #d8efd8; }
button.reject { background: #f5d8d5; }

.feedback {
  min-height: 70px;
  line-height: 1.42;
  font-size: 0.82rem;
  font-weight: 800;
  overflow: auto;
}

.feedback.good { border-color: var(--green); }
.feedback.bad { border-color: var(--red); }

.footer-bar {
  background: var(--panel);
  padding: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}

.footer-bar button {
  min-height: 44px;
  padding: 8px 6px;
  font-size: 0.78rem;
}

.history-sheet {
  background: #f8f0df;
  padding: 8px;
  min-height: 72px;
  max-height: 110px;
  overflow: auto;
}

.history-item {
  border-bottom: 1px dashed #9f8a68;
  padding: 6px 0;
  line-height: 1.35;
  font-size: 0.72rem;
}

.history-item:last-child { border-bottom: 0; }

.small-note {
  font-size: 0.7rem;
  color: #5b4930;
  line-height: 1.35;
  margin-top: 4px;
}

@media (max-width: 360px) {
  .app { width: 100vw; padding: 6px; gap: 6px; }
  .npc-card { grid-template-columns: 78px 1fr; }
  .npc-face { width: 70px; height: 70px; }
  .speech { font-size: 0.92rem; min-height: 78px; }
  button { font-size: 0.88rem; }
  .rule-box, .question-line { font-size: 0.86rem; }
}

  </style>
</head>
<body>
  <div class="app">
    <header class="titlebar">
      <h1>유학생 입장 심사 게임</h1>
      <p>문장을 읽고 허락 여부를 빠르게 판단하세요.</p>

<main class="main-zone">

      <button id="rejectBtn" class="reject">허락 안 함</button>

    <div>
      <div id="feedback" class="feedback">문장을 읽고 판단하세요.</div>
      <div class="small-note">기록은 아래에 최근 항목만 짧게 표시됩니다.</div>
    </div>
  </section>
</main>

<section class="history-sheet">
  <div class="subhead">최근 기록</div>
  <div id="historyList"></div>
</section>

<nav class="footer-bar">

  <button id="scenarioBtn">상황 바꾸기</button>
  <button id="resetBtn">점수 초기화</button>
</nav>

    const ruleBox = document.getElementById("ruleBox");
    const questionLine = document.getElementById("questionLine");

    const passBtn = document.getElementById("passBtn");
    const rejectBtn = document.getElementById("rejectBtn");

    let currentScenarioIndex = 0;
    let queue = [];
    let currentPerson = null;
    let score = 0;
    let combo = 0;
    let history = [];

    function shuffle(arr) {
      const copied = [...arr];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function renderScenario() {
      const s = scenarios[currentScenarioIndex];
      ruleBox.textContent = s.rule;
      questionLine.textContent = s.question;
      memoBox.textContent = s.memo;
      scenarioName.textContent = s.name;
      if (queue.length === 0) queue = shuffle(s.people);
      remainingCount.textContent = queue.length;
      renderStats();
    }

    function renderStats() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      remainingCount.textContent = queue.length;
    }

    function renderPerson(person) {
      npcName.textContent = person.name;
      speech.textContent = person.speech;
      tags.innerHTML = "";
      person.tags.forEach(t => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tags.appendChild(span);
      });
    }

    function nextPerson() {
      const s = scenarios[currentScenarioIndex];
      if (queue.length === 0) {
        queue = shuffle(s.people);
        feedback.className = "feedback";
        feedback.innerHTML = "이 상황의 사람을 모두 심사했습니다. 같은 상황을 다시 시작합니다.";
      }
      currentPerson = queue.shift();
      renderPerson(currentPerson);
      renderStats();
    }

    function addHistory(item) {
      history.unshift(item);
      history = history.slice(0, 8);
      historyList.innerHTML = history.map(h => `
        <div class="history-item">
          <strong>[${h.scenario}]</strong> ${h.name} · ${h.userDecision} / 정답 ${h.correctAnswer} · <strong>${h.result}</strong>
        </div>
      `).join("");
    }

    function judge(userAllows) {
      if (!currentPerson) {
        feedback.className = "feedback bad";
        feedback.textContent = "먼저 시작 / 다음 버튼을 누르세요.";
        return;
      }

      const correct = currentPerson.allow === userAllows;
      const correctAnswer = currentPerson.allow ? "허락" : "허락 안 함";
      const userDecision = userAllows ? "허락" : "허락 안 함";

      if (correct) {
        combo += 1;
        score += 10 + Math.min(combo - 1, 5);
        feedback.className = "feedback good";
        feedback.innerHTML = `정답입니다. ${currentPerson.explanation}`;
      } else {
        combo = 0;
        score = Math.max(0, score - 5);
        feedback.className = "feedback bad";
        feedback.innerHTML = `오답입니다. 정답은 <strong>${correctAnswer}</strong>입니다. ${currentPerson.explanation}`;
      }

      addHistory({
        scenario: scenarios[currentScenarioIndex].name,
        name: currentPerson.name,
        userDecision,
        correctAnswer,
        result: correct ? "정답" : "오답"
      });

      currentPerson = null;
      npcName.textContent = "-";
      speech.textContent = "다음 사람을 받으려면 시작 / 다음 버튼을 누르세요.";
      tags.innerHTML = "";
      renderStats();
    }

    function changeScenario() {
      currentScenarioIndex = (currentScenarioIndex + 1) % scenarios.length;
      queue = [];
      currentPerson = null;
      renderScenario();
      npcName.textContent = "-";
      speech.textContent = "상황이 바뀌었습니다. 시작 / 다음 버튼을 누르세요.";
      tags.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "새 규칙을 읽고 판단하세요.";
    }

    function resetGame() {
      score = 0;
      combo = 0;
      history = [];
      historyList.innerHTML = '<div class="history-item">아직 기록이 없습니다.</div>';
      queue = [];
      currentPerson = null;
      renderScenario();
      npcName.textContent = "-";
      speech.textContent = "점수가 초기화되었습니다. 시작 / 다음 버튼을 누르세요.";
      tags.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "문장을 읽고 판단하세요.";
    }

    startBtn.addEventListener("click", nextPerson);
    scenarioBtn.addEventListener("click", changeScenario);
    resetBtn.addEventListener("click", resetGame);
    passBtn.addEventListener("click", () => judge(true));
    rejectBtn.addEventListener("click", () => judge(false));

    renderScenario();
    historyList.innerHTML = '<div class="history-item">아직 기록이 없습니다.</div>';
  </script></body>
</html>
