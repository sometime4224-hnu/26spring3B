<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유학생 입장 심사 게임</title>
  <style>
    :root {
      --bg: #f4efe4;
      --panel: #ddd1b8;
      --panel-dark: #b49e78;
      --ink: #2b2217;
      --accent: #7a2e1f;
      --green: #2e7d32;
      --red: #b3261e;
      --yellow: #c78c1f;
      --line: #6a5a43;
      --shadow: rgba(0,0,0,0.18);
    }* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Noto Sans KR", system-ui, -apple-system, Segoe UI, sans-serif;
  background: linear-gradient(180deg, #e8dfcf 0%, #f7f2e9 100%);
  color: var(--ink);
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px;
}

.titlebar {
  background: var(--accent);
  color: #fff7ea;
  border: 4px solid #4d1c13;
  box-shadow: 0 6px 0 #4d1c13;
  padding: 14px 18px;
  margin-bottom: 14px;
}

.titlebar h1 {
  margin: 0 0 6px;
  font-size: 1.4rem;
}

.titlebar p {
  margin: 0;
  opacity: 0.95;
  font-size: 0.95rem;
}

.top-grid {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 14px;
  margin-bottom: 14px;
}

.panel {
  background: var(--panel);
  border: 4px solid var(--line);
  box-shadow: 0 6px 0 var(--line), 0 8px 14px var(--shadow);
  padding: 14px;
}

.rule-box {
  background: #f9f3e8;
  border: 3px dashed var(--line);
  padding: 12px;
  margin-top: 10px;
  min-height: 86px;
  display: flex;
  align-items: center;
  font-weight: 800;
  line-height: 1.6;
  font-size: 1.08rem;
}

.subhead {
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #5a452e;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat {
  background: #f9f3e8;
  border: 3px solid var(--line);
  padding: 10px;
  min-height: 74px;
}

.stat .label {
  font-size: 0.82rem;
  color: #6c583c;
  margin-bottom: 6px;
  font-weight: 700;
}

.stat .value {
  font-size: 1.45rem;
  font-weight: 900;
}

.main-grid {
  display: grid;
  grid-template-columns: 0.95fr 1.05fr;
  gap: 14px;
  align-items: start;
}

.npc-card {
  background: #efe3ca;
  border: 4px solid var(--line);
  padding: 14px;
  min-height: 470px;
  position: relative;
}

.npc-face {
  width: 160px;
  height: 160px;
  border-radius: 18px;
  margin: 8px auto 14px;
  background: #fff5e5;
  border: 4px solid var(--line);
  position: relative;
  overflow: hidden;
}

.hair, .eye, .mouth, .body {
  position: absolute;
}

.hair {
  top: 10px;
  left: 20px;
  width: 116px;
  height: 56px;
  background: #4b3521;
  border-radius: 30px 30px 10px 10px;
}

.eye {
  top: 72px;
  width: 18px;
  height: 18px;
  background: #2c2115;
  border-radius: 50%;
}

.eye.left { left: 46px; }
.eye.right { right: 46px; }

.mouth {
  bottom: 34px;
  left: 50%;
  transform: translateX(-50%);
  width: 48px;
  height: 18px;
  border-bottom: 4px solid #7a2e1f;
  border-radius: 0 0 30px 30px;
}

.body {
  left: 24px;
  right: 24px;
  bottom: -36px;
  height: 78px;
  background: #7b8fb8;
  border-radius: 18px 18px 0 0;
  border: 4px solid var(--line);
}

.npc-name {
  text-align: center;
  font-weight: 900;
  font-size: 1.2rem;
  margin-bottom: 8px;
}

.speech {
  background: #fffaf0;
  border: 4px solid var(--line);
  padding: 14px;
  line-height: 1.8;
  min-height: 128px;
  font-size: 1.1rem;
  font-weight: 700;
}

.tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.tag {
  background: #f7ead0;
  border: 2px solid var(--line);
  padding: 6px 10px;
  font-size: 0.88rem;
  font-weight: 700;
}

.desk {
  background: #ece0c7;
  border: 4px solid var(--line);
  padding: 14px;
  min-height: 470px;
}

.question-card {
  background: #fff8ea;
  border: 4px solid var(--line);
  padding: 14px;
  margin-bottom: 14px;
}

.question-card h2 {
  margin: 0 0 10px;
  font-size: 1.12rem;
}

.question-line {
  background: #f4ead7;
  border-left: 6px solid var(--accent);
  padding: 12px;
  line-height: 1.7;
  font-size: 1.06rem;
  font-weight: 800;
}

.memo {
  background: #fef6cf;
  border: 3px dashed #9a7a1f;
  padding: 12px;
  margin-bottom: 14px;
  line-height: 1.7;
  font-size: 0.96rem;
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

button {
  border: 4px solid var(--line);
  padding: 14px 12px;
  font-size: 1.04rem;
  font-weight: 900;
  cursor: pointer;
  background: #fff8ea;
  color: var(--ink);
  box-shadow: 0 4px 0 var(--line);
  transition: transform 0.05s ease, filter 0.15s ease;
}

button:hover { filter: brightness(0.98); }
button:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--line); }
button.pass { background: #d8efd8; }
button.reject { background: #f5d8d5; }
button.small {
  padding: 10px 12px;
  font-size: 0.96rem;
}

.feedback {
  min-height: 82px;
  background: #fff8ea;
  border: 4px solid var(--line);
  padding: 12px;
  line-height: 1.65;
  font-weight: 700;
}

.feedback.good { border-color: var(--green); }
.feedback.bad { border-color: var(--red); }

.footer-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.history {
  margin-top: 14px;
  background: #f8f0df;
  border: 4px solid var(--line);
  padding: 12px;
  max-height: 280px;
  overflow: auto;
}

.history-item {
  border-bottom: 2px dashed #9f8a68;
  padding: 10px 0;
  line-height: 1.6;
  font-size: 0.95rem;
}

.history-item:last-child { border-bottom: 0; }

.legend {
  margin-top: 10px;
  font-size: 0.92rem;
  color: #5b4930;
  line-height: 1.7;
}

.hidden { display: none; }

@media (max-width: 900px) {
  .top-grid, .main-grid {
    grid-template-columns: 1fr;
  }
  .npc-card, .desk {
    min-height: auto;
  }
  .buttons {
    grid-template-columns: 1fr;
  }
}

  </style>
</head>

  <div class="wrap">
    <div class="titlebar">
      <h1>유학생 입장 심사 게임</h1>
      <p>-았/었어요, -고 있어요, -(으)ㄹ 생각이에요 / 예정이에요 / 계획이에요를 보고 통과 여부를 판단하세요.</p>
    </div><div class="top-grid">
  <section class="panel">
    <div class="subhead">오늘의 입장 규칙</div>
    <div id="ruleBox" class="rule-box"></div>
  </section>

  <section class="panel">
    <div class="subhead">상태</div>
    <div class="stats">
      <div class="stat">
        <div class="label">상황</div>
        <div id="scenarioName" class="value">-</div>
      </div>
      <div class="stat">
        <div class="label">남은 사람</div>
        <div id="remainingCount" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">점수</div>
        <div id="score" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">연속 정답</div>
        <div id="combo" class="value">0</div>
      </div>
    </div>
  </section>
</div>

<div class="main-grid">
  <section class="npc-card">
    <div class="subhead">대기자</div>
    <div class="npc-face" aria-hidden="true">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="body"></div>
    </div>
    <div id="npcName" class="npc-name">-</div>
    <div id="speech" class="speech">시작 버튼을 누르세요.</div>
    <div id="tags" class="tags"></div>
  </section>

  <section class="desk">
    <div class="subhead">심사대</div>
    <div class="question-card">
      <h2>질문</h2>
      <div id="questionLine" class="question-line"></div>
    </div>

    <div id="memoBox" class="memo"></div>

    <div class="buttons">
      <button id="passBtn" class="pass">허락</button>
      <button id="rejectBtn" class="reject">허락 안 함</button>
    </div>

    <div id="feedback" class="feedback">문장을 읽고 판단하세요.</div>

    <div class="footer-controls">
      <button id="startBtn" class="small">시작 / 다음 사람</button>
      <button id="scenarioBtn" class="small">상황 바꾸기</button>
      <button id="resetBtn" class="small">점수 초기화</button>
    </div>

    <div class="legend">
      판단 기준은 문장의 핵심 문법입니다. 완료된 일은 <strong>-았/었어요</strong>, 지금 진행 중인 일은 <strong>-고 있어요</strong>, 앞으로 할 일은 <strong>-(으)ㄹ 생각이에요 / 예정이에요 / 계획이에요</strong>에 주의하세요.
    </div>
  </section>
</div>

<section class="history">
  <div class="subhead">판단 기록</div>
  <div id="historyList"></div>
</section>

    const ruleBox = document.getElementById("ruleBox");
    const questionLine = document.getElementById("questionLine");
    const memoBox = document.getElementById("memoBox");
    const scenarioName = document.getElementById("scenarioName");
    const remainingCount = document.getElementById("remainingCount");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const npcName = document.getElementById("npcName");
    const speech = document.getElementById("speech");
    const tags = document.getElementById("tags");
    const feedback = document.getElementById("feedback");
    const historyList = document.getElementById("historyList");

    const startBtn = document.getElementById("startBtn");
    const scenarioBtn = document.getElementById("scenarioBtn");
    const resetBtn = document.getElementById("resetBtn");
    const passBtn = document.getElementById("passBtn");
    const rejectBtn = document.getElementById("rejectBtn");

    let currentScenarioIndex = 0;
    let queue = [];
    let currentPerson = null;
    let score = 0;
    let combo = 0;
    let history = [];

    function shuffle(arr) {
      const copied = [...arr];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function renderScenario() {
      const s = scenarios[currentScenarioIndex];
      ruleBox.textContent = s.rule;
      questionLine.textContent = s.question;
      memoBox.textContent = s.memo;
      scenarioName.textContent = s.name;
      if (queue.length === 0) queue = shuffle(s.people);
      remainingCount.textContent = queue.length;
      renderStats();
    }

    function renderStats() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      remainingCount.textContent = queue.length;
    }

    function renderPerson(person) {
      npcName.textContent = person.name;
      speech.textContent = person.speech;
      tags.innerHTML = "";
      person.tags.forEach(t => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tags.appendChild(span);
      });
    }

    function nextPerson() {
      const s = scenarios[currentScenarioIndex];
      if (queue.length === 0) {
        queue = shuffle(s.people);
        feedback.className = "feedback";
        feedback.innerHTML = `이 상황의 사람을 모두 심사했습니다. 같은 상황을 다시 시작합니다.`;
      }
      currentPerson = queue.shift();
      renderPerson(currentPerson);
      renderStats();
    }

    function addHistory(item) {
      history.unshift(item);
      history = history.slice(0, 20);
      historyList.innerHTML = history.map(h => `
        <div class="history-item">
          <strong>[${h.scenario}]</strong> ${h.name}<br>
          말: ${h.speech}<br>
          판단: ${h.userDecision} / 정답: ${h.correctAnswer}<br>
          결과: <strong>${h.result}</strong>
        </div>
      `).join("");
    }

    function judge(userAllows) {
      if (!currentPerson) {
        feedback.className = "feedback bad";
        feedback.textContent = "먼저 시작 / 다음 사람 버튼을 눌러 주세요.";
        return;
      }

      const correct = currentPerson.allow === userAllows;
      const correctAnswer = currentPerson.allow ? "허락" : "허락 안 함";
      const userDecision = userAllows ? "허락" : "허락 안 함";

      if (correct) {
        combo += 1;
        score += 10 + Math.min(combo - 1, 5);
        feedback.className = "feedback good";
        feedback.innerHTML = `정답입니다. ${currentPerson.explanation}`;
      } else {
        combo = 0;
        score = Math.max(0, score - 5);
        feedback.className = "feedback bad";
        feedback.innerHTML = `오답입니다. 정답은 <strong>${correctAnswer}</strong>입니다. ${currentPerson.explanation}`;
      }

      addHistory({
        scenario: scenarios[currentScenarioIndex].name,
        name: currentPerson.name,
        speech: currentPerson.speech,
        userDecision,
        correctAnswer,
        result: correct ? "정답" : "오답"
      });

      currentPerson = null;
      npcName.textContent = "-";
      speech.textContent = "다음 사람을 받으려면 시작 / 다음 사람 버튼을 누르세요.";
      tags.innerHTML = "";
      renderStats();
    }

    function changeScenario() {
      currentScenarioIndex = (currentScenarioIndex + 1) % scenarios.length;
      queue = [];
      currentPerson = null;
      renderScenario();
      npcName.textContent = "-";
      speech.textContent = "상황이 바뀌었습니다. 시작 / 다음 사람 버튼을 누르세요.";
      tags.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "새 규칙을 읽고 판단하세요.";
    }

    function resetGame() {
      score = 0;
      combo = 0;
      history = [];
      historyList.innerHTML = "";
      queue = [];
      currentPerson = null;
      renderScenario();
      npcName.textContent = "-";
      speech.textContent = "점수가 초기화되었습니다. 시작 / 다음 사람 버튼을 누르세요.";
      tags.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "문장을 읽고 판단하세요.";
    }

    startBtn.addEventListener("click", nextPerson);
    scenarioBtn.addEventListener("click", changeScenario);
    resetBtn.addEventListener("click", resetGame);
    passBtn.addEventListener("click", () => judge(true));
    rejectBtn.addEventListener("click", () => judge(false));

    renderScenario();
    historyList.innerHTML = '<div class="history-item">아직 기록이 없습니다.</div>';
  </script></body>
</html>
