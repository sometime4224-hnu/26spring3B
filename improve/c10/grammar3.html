<html lang="ko">
<head>
    <meta charset="UTF-8">

<body class="bg-slate-50 min-h-screen flex flex-col max-w-md mx-auto shadow-xl">
    <nav class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>
    </nav>

    <header class="bg-white px-5 py-4 border-b border-slate-200 sticky top-[60px] z-20">
        <div class="flex justify-between items-start gap-3">
            <div>
                <p class="text-xs text-emerald-600 font-bold uppercase tracking-wide">Grammar Upgrade</p>
                <h1 class="text-lg font-extrabold text-slate-900 mt-0.5">V-(으)ㄹ 생각/계획/예정이다</h1>
                <p class="text-xs text-slate-500 mt-1">5과: 미래 의향/계획/일정 말하기</p>
            </div>
            <button id="translation-btn" type="button" class="flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200">
                <i data-lucide="languages" class="w-3 h-3 mr-1"></i>
                <span id="translation-text">Tiếng Việt OFF</span>
            </button>
        </div>
    </header>

    <div class="flex border-b border-slate-200 bg-white sticky top-[139px] z-10">
        <button id="tab-learn" type="button" onclick="setTab('learn')" class="flex-1 py-3 text-sm font-semibold text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50">공부해요</button>
        <button id="tab-practice" type="button" onclick="setTab('practice')" class="flex-1 py-3 text-sm font-semibold text-slate-500">연습해요</button>
    </div>

    <main id="app-content" class="flex-1 p-4 pb-14"></main>

    <script>
        const lessonData = {
            title: "V-(으)ㄹ 생각/계획/예정이다",
            meaningKo: "미래에 할 일에 대한 의향, 구체 계획, 예정된 일정을 말할 때 사용해요.",
            meaningVi: "Dùng để diễn đạt ý định, kế hoạch cụ thể hoặc lịch trình dự kiến trong tương lai.",
            goalsKo: [
                "'생각/계획/예정'의 뉘앙스 차이를 구별할 수 있어요.",
                "받침 유무에 맞게 '-(으)ㄹ'을 정확히 붙일 수 있어요.",
                "문맥에 따라 '-려고 하다'와도 구분해 선택할 수 있어요."
            ],
            goalsVi: [
                "Phân biệt sắc thái của '생각/계획/예정'.",
                "Gắn đúng '-(으)ㄹ' theo 받침.",
                "Chọn đúng giữa mẫu mục tiêu và '-려고 하다' theo ngữ cảnh."
            ]
        };

        const questionBank = [
            {
                id: "g3_q1",
                type: "mcq",
                prompt: "주말에는 집에서 푹 ____. (쉬다)",
                promptVi: "Cuối tuần tôi định nghỉ ngơi thoải mái ở nhà.",
                options: ["쉴 생각이에요", "쉬을 생각이에요", "쉰 생각이에요"],
                answer: "쉴 생각이에요",
                explanationKo: "'쉬다'는 어간 '쉬-' 뒤에 ㄹ을 붙여 '쉴 생각'이 돼요.",
                explanationVi: "'쉬다' thêm ㄹ vào gốc '쉬-' -> '쉴 생각'."
            },
            {
                id: "g3_q2",
                type: "mcq",
                prompt: "회사에서 이미 공지했어요. 다음 달에 새 매장을 ____. ",
                promptVi: "Công ty đã thông báo rồi. Tháng sau sẽ mở chi nhánh mới.",
                options: ["열 예정입니다", "열 생각입니다", "열려고 해요"],
                answer: "열 예정입니다",
                explanationKo: "이미 공지된 공식 일정은 '-(으)ㄹ 예정이다'가 가장 자연스러워요.",
                explanationVi: "Với lịch chính thức đã thông báo, '-(으)ㄹ 예정이다' tự nhiên nhất."
            },
            {
                id: "g3_q3",
                type: "mcq",
                prompt: "졸업 후에는 한국에서 계속 ____.",
                promptVi: "Sau khi tốt nghiệp, tôi có kế hoạch tiếp tục làm việc ở Hàn Quốc.",
                contextKo: "상황: 자격증 준비, 지원 일정 등 구체 계획을 이미 세움",
                contextVi: "Tình huống: Đã lập kế hoạch cụ thể (chứng chỉ, lịch nộp hồ sơ).",
                options: ["일할 계획이에요", "일할 예정이에요", "일하려면 멀었어요"],
                answer: "일할 계획이에요",
                explanationKo: "준비 단계를 포함한 구체 계획을 말하므로 '-(으)ㄹ 계획이다'가 맞아요.",
                explanationVi: "Vì nói kế hoạch cụ thể có bước chuẩn bị, dùng '-(으)ㄹ 계획이다'."
            },
            {
                id: "g3_q4",
                type: "mcq",
                prompt: "지금 막 문을 나가려는 순간이에요. 가장 자연스러운 말은?",
                promptVi: "Ngay lúc này sắp bước ra khỏi cửa. Câu tự nhiên nhất là?",
                options: ["나갈 생각이에요", "나가려고 해요", "나갈 예정이에요"],
                answer: "나가려고 해요",
                explanationKo: "바로 지금의 의도/직전 행동은 '-려고 하다'가 더 자연스러워요.",
                explanationVi: "Ý định ngay lúc này hoặc hành động sắp xảy ra -> '-려고 하다' tự nhiên hơn."
            },
            {
                id: "g3_q5",
                type: "fill",
                prompt: "방학 때 부모님과 제주도에 ____. (가다)",
                promptVi: "Kỳ nghỉ tôi dự định đi Jeju với bố mẹ.",
                answers: ["갈 생각이에요", "갈 생각입니다"],
                hint: "가다 -> 갈 ...",
                explanationKo: "'가다'는 받침이 없어서 '갈 생각이에요'가 돼요.",
                explanationVi: "'가다' không có 받침 nên thành '갈 생각이에요'."
            },
            {
                id: "g3_q6",
                type: "fill",
                prompt: "다음 주 화요일에 건강검진을 ____. (받다, 예약 완료)",
                promptVi: "Thứ Ba tuần sau tôi sẽ khám sức khỏe (đã đặt lịch).",
                answers: ["받을 예정이에요", "받을 예정입니다"],
                hint: "받다(받침 O) -> 받을 ...",
                explanationKo: "예약이 끝난 일정이라 '-(으)ㄹ 예정이다'를 쓰는 것이 자연스러워요.",
                explanationVi: "Vì là lịch đã đặt sẵn, dùng '-(으)ㄹ 예정이다' tự nhiên."
            },
            {
                id: "g3_q7",
                type: "fill",
                prompt: "올해 말까지 TOPIK 5급을 목표로 공부할 ____. (계획)",
                promptVi: "Tôi có kế hoạch học đến cuối năm để đạt TOPIK 5.",
                answers: ["계획이에요", "계획입니다"],
                hint: "공부할 + 계획...",
                explanationKo: "'-(으)ㄹ 계획이다'는 목표를 향한 구체적인 학습 설계에 잘 맞아요.",
                explanationVi: "'-(으)ㄹ 계획이다' phù hợp khi nói kế hoạch học tập cụ thể theo mục tiêu."
            },
            {
                id: "g3_q8",
                type: "mcq",
                prompt: "받침 있는 동사 뒤 형태로 맞는 것을 고르세요.",
                promptVi: "Chọn dạng đúng sau động từ có 받침.",
                options: ["먹을 생각이에요", "먹ㄹ 생각이에요", "먹를 생각이에요"],
                answer: "먹을 생각이에요",
                explanationKo: "받침이 있으면 '-을'을 붙여 '먹을'이 돼요.",
                explanationVi: "Nếu có 받침, thêm '-을' -> '먹을'."
            }
        ];

        const KEY = "c10.grammar3.upgraded.v1";

        function loadPref() {
            try {
                return JSON.parse(localStorage.getItem(KEY) || "{}");
            } catch (e) {
                return {};
            }
        }

        function savePref(data) {
            try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {}
        }

        function shuffle(arr) {
            const copied = [...arr];
            for (let i = copied.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }

        function cloneQuestions(pool) {
            return shuffle(pool).map((q) => ({
                ...q,
                options: q.options ? [...q.options] : undefined,
                answers: q.answers ? [...q.answers] : undefined
            }));
        }

        function createQuiz(pool, modeLabel = "전체 문제") {
            return {
                modeLabel,
                questions: cloneQuestions(pool),
                index: 0,
                score: 0,
                selected: "",
                showResult: false,
                showHint: false,
                finished: false,
                mistakes: []
            };
        }

        const pref = loadPref();
        const state = {
            activeTab: "learn",
            showVi: Boolean(pref.showVi),
            best: pref.best || { score: 0, total: questionBank.length, percent: 0 },
            quiz: createQuiz(questionBank)
        };

        function viClass() { return state.showVi ? "block" : "hidden"; }
        function norm(v) { return String(v || "").replace(/\s+/g, "").trim(); }
        function currentQ() { return state.quiz.questions[state.quiz.index]; }
        function setTab(tab) { state.activeTab = tab; render(); }

        function toggleTranslation() {
            state.showVi = !state.showVi;
            savePref({ showVi: state.showVi, best: state.best });
            render();
        }

        function chooseOption(option) {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "mcq" || quiz.showResult || quiz.finished) return;

            quiz.selected = option;
            quiz.showResult = true;
            if (option === q.answer) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: option });
            }
            render();
        }

        function submitFill() {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "fill" || quiz.showResult || quiz.finished) return;

            const input = document.getElementById("fill-input");
            const value = input ? input.value : "";
            if (!norm(value)) return;

            quiz.selected = value;
            quiz.showResult = true;
            const ok = q.answers.some((a) => norm(a) === norm(value));
            if (ok) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: value });
            }
            render();
        }

        function toggleHint() {
            if (state.quiz.showResult || state.quiz.finished) return;
            state.quiz.showHint = !state.quiz.showHint;
            render();
        }

        function nextQuestion() {
            const quiz = state.quiz;
            if (!quiz.showResult) return;

            quiz.selected = "";
            quiz.showResult = false;
            quiz.showHint = false;

            if (quiz.index < quiz.questions.length - 1) {
                quiz.index += 1;
            } else {
                quiz.finished = true;
                updateBest();
            }
            render();
        }

        function updateBest() {
            const quiz = state.quiz;
            const percent = Math.round((quiz.score / quiz.questions.length) * 100);
            if (
                percent > state.best.percent ||
                (percent === state.best.percent && quiz.questions.length >= state.best.total && quiz.score > state.best.score)
            ) {
                state.best = { score: quiz.score, total: quiz.questions.length, percent };
                savePref({ showVi: state.showVi, best: state.best });
            }
        }

        function restartQuiz() {
            state.quiz = createQuiz(questionBank);
            render();
        }

        function retryWrong() {
            const unique = [];
            const seen = new Set();
            state.quiz.mistakes.forEach((m) => {
                if (!seen.has(m.question.id)) {
                    seen.add(m.question.id);
                    unique.push(m.question);
                }
            });
            if (!unique.length) return;
            state.quiz = createQuiz(unique, "오답 다시 풀기");
            render();
        }

        function badgeFor(percent) {
            if (percent >= 90) return { label: "완전 이해", cls: "bg-emerald-100 text-emerald-700" };
            if (percent >= 75) return { label: "좋아요", cls: "bg-teal-100 text-teal-700" };
            if (percent >= 60) return { label: "조금 더 연습", cls: "bg-amber-100 text-amber-700" };
            return { label: "핵심 복습 필요", cls: "bg-rose-100 text-rose-700" };
        }

        function renderLearn() {
            const vi = viClass();
            return `
                <div class="space-y-4">
                    <section class="bg-gradient-to-br from-emerald-50 to-white border border-emerald-100 rounded-2xl p-5 shadow-sm">
                        <h2 class="text-2xl font-black text-emerald-700">${lessonData.title}</h2>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${lessonData.meaningKo}</p>
                        <p class="text-xs text-emerald-600 mt-1 ${vi}">${lessonData.meaningVi}</p>

                        <div class="mt-4 bg-white border border-emerald-100 rounded-xl p-3">
                            <p class="text-xs font-bold text-slate-500">학습 전략 (효과 강화)</p>
                            <ol class="mt-2 text-sm text-slate-700 list-decimal pl-5 space-y-1">
                                <li>먼저 의도/계획/예정 중 문맥에 맞는 기능을 선택하기</li>
                                <li>받침 규칙으로 '-(으)ㄹ' 형태를 정확히 만들기</li>
                                <li>즉시 피드백 후 오답 재풀이로 실수를 줄이기</li>
                            </ol>
                            <ul class="mt-2 text-xs text-emerald-600 list-disc pl-5 space-y-1 ${vi}">
                                ${lessonData.goalsVi.map((g) => `<li>${g}</li>`).join("")}
                            </ul>
                        </div>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-slate-800 flex items-center">
                            <i data-lucide="git-compare" class="w-4 h-4 mr-2 text-emerald-600"></i>
                            헷갈림 비교
                        </h3>
                        <div class="mt-3 overflow-x-auto">
                            <table class="w-full text-sm border-collapse">
                                <thead>
                                    <tr class="bg-slate-100">
                                        <th class="text-left p-2 border border-slate-200">표현</th>
                                        <th class="text-left p-2 border border-slate-200">핵심 기능</th>
                                        <th class="text-left p-2 border border-slate-200">예문</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-emerald-700">-(으)ㄹ 생각이다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>개인 의향 (비교적 유동적)</p>
                                            <p class="text-[11px] leading-4 text-emerald-600 mt-1 break-words ${vi}">Ý định cá nhân (có thể thay đổi)</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">주말에 쉴 생각이에요.</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-teal-700">-(으)ㄹ 계획이다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>구체 계획 (단계/준비 포함)</p>
                                            <p class="text-[11px] leading-4 text-emerald-600 mt-1 break-words ${vi}">Kế hoạch cụ thể có bước chuẩn bị</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">올해 한국에서 일할 계획이에요.</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-blue-700">-(으)ㄹ 예정이다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>정해진 일정/공식 계획</p>
                                            <p class="text-[11px] leading-4 text-emerald-600 mt-1 break-words ${vi}">Lịch đã định hoặc kế hoạch chính thức</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">다음 주에 출국할 예정입니다.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-xs text-rose-600 mt-2">주의: '-(으)ㄹ 예정이다'는 공지문/공식 말하기에서 자주 쓰여요.</p>
                        <p class="text-xs text-emerald-600 mt-1 ${vi}">Lưu ý: '-(으)ㄹ 예정이다' thường dùng trong thông báo/hoàn cảnh trang trọng.</p>
                    </section>

                    <section class="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-amber-900 flex items-center">
                            <i data-lucide="brain" class="w-4 h-4 mr-2"></i>
                            미니 인출 연습
                        </h3>
                        <p class="text-xs text-amber-700 mt-1">정답을 먼저 머릿속에서 말한 후 펼쳐보세요.</p>
                        <div class="mt-3 space-y-2">
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"다음 달에 건강검진을 ____" (받다, 예약 완료)</summary>
                                <p class="text-sm mt-2">정답: <b>받을 예정입니다</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"졸업 후 한국에서 계속 ____" (일하다, 구체 준비)</summary>
                                <p class="text-sm mt-2">정답: <b>일할 계획이에요</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"지금 바로 ____" (나가다, 막 하려는 상황)</summary>
                                <p class="text-sm mt-2">정답: <b>나가려고 해요</b> (비교 표현)</p>
                            </details>
                        </div>
                    </section>
                </div>
            `;
        }

        function renderPractice() {
            const quiz = state.quiz;
            const vi = viClass();

            if (quiz.finished) {
                const percent = Math.round((quiz.score / quiz.questions.length) * 100);
                const badge = badgeFor(percent);
                const mistakes = quiz.mistakes.length
                    ? quiz.mistakes.map((m, i) => `
                        <li class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs">
                            <p class="font-semibold">${i + 1}. ${m.question.prompt}</p>
                            <p class="mt-1">내 답: <b>${m.userAnswer}</b></p>
                            <p>정답: <b>${m.question.type === 'mcq' ? m.question.answer : m.question.answers[0]}</b></p>
                            <p class="mt-1">${m.question.explanationKo}</p>
                            <p class="text-emerald-600 mt-1 ${vi}">${m.question.explanationVi}</p>
                        </li>
                    `).join("")
                    : `<li class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-700">오답이 없습니다. 훌륭해요!</li>`;

                return `
                    <div class="space-y-4">
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                            <div class="w-16 h-16 rounded-full bg-emerald-100 mx-auto flex items-center justify-center text-emerald-600">
                                <i data-lucide="trophy" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-xl font-black text-slate-800 mt-3">${quiz.score} / ${quiz.questions.length}</h2>
                            <p class="text-sm text-slate-600 mt-1">정답률 ${percent}%</p>
                            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs font-bold ${badge.cls}">${badge.label}</span>
                            <p class="text-xs text-slate-500 mt-2">최고 기록: ${state.best.score}/${state.best.total} (${state.best.percent}%)</p>
                            <p class="text-xs text-emerald-600 mt-1 ${vi}">Best score: ${state.best.percent}%</p>
                            <div class="grid gap-2 mt-4">
                                <button onclick="restartQuiz()" class="w-full bg-emerald-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-emerald-700">처음부터 다시</button>
                                <button onclick="retryWrong()" ${quiz.mistakes.length ? "" : "disabled"} class="w-full border border-slate-300 rounded-lg py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100 disabled:opacity-50">오답만 다시 풀기</button>
                            </div>
                        </section>
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-3">오답 노트</h3>
                            <ul class="space-y-2">${mistakes}</ul>
                        </section>
                    </div>
                `;
            }

            const q = currentQ();
            const progress = Math.round(((quiz.showResult ? quiz.index + 1 : quiz.index) / quiz.questions.length) * 100);
            const isCorrect = q.type === "mcq"
                ? quiz.selected === q.answer
                : q.answers.some((a) => norm(a) === norm(quiz.selected));

            const options = q.type === "mcq"
                ? q.options.map((opt) => {
                    let style = "border-slate-200 hover:border-emerald-300 hover:bg-emerald-50";
                    let icon = "";
                    if (quiz.showResult) {
                        if (opt === q.answer) {
                            style = "border-emerald-500 bg-emerald-50 text-emerald-700";
                            icon = "<i data-lucide='check' class='w-4 h-4 text-emerald-600'></i>";
                        } else if (opt === quiz.selected) {
                            style = "border-rose-400 bg-rose-50 text-rose-700";
                            icon = "<i data-lucide='x' class='w-4 h-4 text-rose-600'></i>";
                        } else {
                            style = "border-slate-200 text-slate-400";
                        }
                    }
                    return `<button onclick="chooseOption('${opt}')" ${quiz.showResult ? "disabled" : ""} class="w-full border-2 rounded-lg px-4 py-3 text-left font-semibold mb-2 flex justify-between items-center ${style}"><span>${opt}</span>${icon}</button>`;
                }).join("")
                : `
                    <label for="fill-input" class="text-xs font-semibold text-slate-500">정답 입력</label>
                    <input id="fill-input" type="text" autocomplete="off" ${quiz.showResult ? "disabled" : ""} class="w-full mt-1 border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="예: 갈 생각이에요" onkeydown="if(event.key==='Enter'){submitFill();}">
                    <div class="flex gap-2 mt-3">
                        <button onclick="submitFill()" ${quiz.showResult ? "disabled" : ""} class="flex-1 bg-emerald-600 text-white rounded-lg py-2.5 text-sm font-semibold">정답 확인</button>
                        <button onclick="toggleHint()" ${quiz.showResult ? "disabled" : ""} class="px-3 border border-slate-300 rounded-lg text-sm font-semibold text-slate-600">힌트</button>
                    </div>
                    <p class="text-xs text-amber-700 mt-2 ${quiz.showHint ? "block" : "hidden"}">힌트: ${q.hint || "-"}</p>
                `;

            const feedback = quiz.showResult ? `
                <div class="mt-4 rounded-xl border p-4 ${isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                    <p class="text-sm font-bold ${isCorrect ? "text-emerald-700" : "text-rose-700"}">${isCorrect ? "정답입니다!" : "오답입니다. 근거를 확인하세요."}</p>
                    <p class="text-xs text-slate-600 mt-2">내 답: <b>${quiz.selected}</b></p>
                    <p class="text-xs text-slate-700 mt-1">정답: <b>${q.type === "mcq" ? q.answer : q.answers[0]}</b></p>
                    <p class="text-sm text-slate-700 mt-3">${q.explanationKo}</p>
                    <p class="text-xs text-emerald-600 mt-1 ${vi}">${q.explanationVi}</p>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-emerald-600 text-white rounded-lg py-2.5 text-sm font-semibold">다음 문제</button>
                </div>
            ` : "";

            return `
                <div class="space-y-4">
                    <section class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-emerald-700">전략 기반 연습</h2>
                        <p class="text-xs text-slate-600 mt-1">문맥을 보고 '생각/계획/예정'을 구별한 뒤 형태를 정확히 만듭니다.</p>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-emerald-600">${quiz.modeLabel}</span>
                            <span class="text-xs text-slate-500">문제 ${quiz.index + 1}/${quiz.questions.length}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width: ${progress}%;"></div></div>
                        <p class="text-xs text-slate-500 mt-1">점수 ${quiz.score}점</p>

                        <div class="mt-4 bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <p class="text-sm font-semibold text-slate-800">${q.prompt}</p>
                            <p class="text-[11px] text-slate-500 mt-2 ${q.contextKo ? "block" : "hidden"}">${q.contextKo || ""}</p>
                            <p class="text-xs text-emerald-600 mt-1 ${vi}">${q.promptVi || ""}</p>
                            <p class="text-[11px] text-emerald-600 mt-1 ${q.contextVi ? vi : "hidden"}">${q.contextVi || ""}</p>
                        </div>

                        <div class="mt-4">${options}</div>
                        ${feedback}
                    </section>
                </div>
            `;
        }

        function render() {
            const content = document.getElementById("app-content");
            const tabLearn = document.getElementById("tab-learn");
            const tabPractice = document.getElementById("tab-practice");
            const transBtn = document.getElementById("translation-btn");
            const transText = document.getElementById("translation-text");

            if (state.activeTab === "learn") {
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50";
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderLearn();
            } else {
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50";
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderPractice();
            }

            if (state.showVi) {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-emerald-100 text-emerald-700 border border-emerald-200";
                transText.textContent = "Tiếng Việt ON";
            } else {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200";
                transText.textContent = "Tiếng Việt OFF";
            }

            lucide.createIcons();

            if (state.activeTab === "practice") {
                const q = currentQ();
                if (q && q.type === "fill" && !state.quiz.showResult) {
                    const input = document.getElementById("fill-input");
                    if (input) input.focus();
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("translation-btn").addEventListener("click", toggleTranslation);
            render();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
