<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>10과 사진 어휘 4지선다 퀴즈</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
        }

        .top-bar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .quiz-image {
            width: 100%;
            height: clamp(240px, 46vw, 430px);
            object-fit: cover;
            background: #ffffff;
        }

        .option-btn {
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -12px rgba(0,0,0,0.22);
        }

        .option-badge {
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .feedback-enter {
            animation: fadeIn 0.22s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #fff;
        }
    </style>
</head>

<body class="bg-indigo-50 min-h-screen flex flex-col">
    <header class="top-bar sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-3 sm:px-4 h-14 flex items-center justify-between gap-3">
            <h1 class="text-sm sm:text-base font-extrabold text-indigo-600 truncate">
                10과 사진 어휘 퀴즈
            </h1>

            <div class="flex items-center gap-2 shrink-0">
                <button id="restart-btn" type="button" class="px-3 py-1.5 text-xs sm:text-sm font-bold text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition shadow-sm whitespace-nowrap">
                    다시
                </button>
                <button id="shuffle-btn" type="button" class="px-3 py-1.5 text-xs sm:text-sm font-bold text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition shadow-sm whitespace-nowrap">
                    <i class="ph ph-shuffle mr-1"></i> 섞기
                </button>
            </div>
        </div>
    </header>

    <main class="w-full flex-1 px-4 pb-12">
        <div class="w-full max-w-6xl mx-auto mt-4">
            <div id="quiz-stage" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <section class="bg-white border border-gray-200 rounded-3xl shadow-sm overflow-hidden">
                    <div class="p-5 border-b border-gray-100">
                        <div class="flex items-center justify-between gap-4">
                            <div>
                                <p class="text-xs uppercase tracking-[0.18em] text-gray-400">문항</p>
                                <h2 id="progress-text" class="text-lg sm:text-xl font-extrabold text-gray-900 mt-1">1 / 17</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-xs uppercase tracking-[0.18em] text-gray-400">점수</p>
                                <p id="score-text" class="text-lg sm:text-xl font-extrabold text-gray-900 mt-1">0</p>
                            </div>
                        </div>

                        <div class="mt-4 w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="p-4 sm:p-5">
                        <div class="rounded-3xl overflow-hidden border border-gray-200 bg-gray-50">
                            <img id="question-image" class="quiz-image" src="" alt="문항 이미지" />
                        </div>

                        <div class="mt-4 flex items-start justify-between gap-3">
                            <div>
                                <p class="text-base font-bold text-gray-900">사진을 보고 알맞은 어휘를 고르세요.</p>
                            </div>

                            <button id="speak-answer-btn" type="button" class="hidden shrink-0 px-3 py-2 rounded-xl border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 transition shadow-sm">
                                <i class="ph ph-speaker-high text-lg"></i>
                            </button>
                        </div>

                        <div id="feedback-box" class="hidden mt-4 rounded-2xl border p-4 feedback-enter"></div>
                    </div>
                </section>

                <section class="bg-white border border-gray-200 rounded-3xl shadow-sm p-4 sm:p-5">
                    <div class="mb-4">
                        <h3 class="text-lg font-extrabold text-gray-900">선택지</h3>
                        <p class="text-sm text-gray-500 mt-1">정답을 고르면 바로 채점됩니다.</p>
                    </div>

                    <div id="options-grid" class="grid grid-cols-1 gap-3"></div>

                    <button id="next-btn" type="button" class="hidden w-full mt-4 px-4 py-3 rounded-2xl bg-gray-900 text-white font-bold hover:bg-black transition">
                        다음 문제
                    </button>
                </section>
            </div>

            <section id="result-section" class="hidden mt-6"></section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const vocabularyData = [
                {
                    id: 'v01',
                    korean: '고백하다',
                    hint: '사랑하는 마음을 말로 표현하다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v01_confess.webp'
                },
                {
                    id: 'v02',
                    korean: '가슴이 두근거리다',
                    hint: '좋아하거나 놀랐을 때 심장이 빨리 뛰다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v02_heart_pound.webp'
                },
                {
                    id: 'v03',
                    korean: '나란히 앉다',
                    hint: '옆으로 같이 앉다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v03_sit_together.webp'
                },
                {
                    id: 'v04',
                    korean: '마음씨가 착하다',
                    hint: '마음이 따뜻하고 좋다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v04_kind_heart.webp'
                },
                {
                    id: 'v05',
                    korean: '말이 잘 통하다/성격이 잘 맞다',
                    hint: '대화와 성격이 잘 맞아 편하고 잘 어울리다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v20_match_communicate.webp'
                },
                {
                    id: 'v06',
                    korean: '매력이 있다',
                    hint: '사람의 마음을 끄는 힘이 있다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v06_attractive.webp'
                },
                {
                    id: 'v07',
                    korean: '사랑에 빠지다',
                    hint: '누군가를 아주 많이 좋아하게 되다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v07_fall_in_love.webp'
                },
                {
                    id: 'v08',
                    korean: '사귀다/연애하다',
                    hint: '서로 좋아하는 사이가 되어 관계를 이어가다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v21_dating_relationship.webp'
                },
                {
                    id: 'v09',
                    korean: '선보다',
                    hint: '결혼할 사람을 정하기 위해 소개로 만나다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v10_blind_date.webp'
                },
                {
                    id: 'v10',
                    korean: '소개팅하다',
                    hint: '다른 사람이 소개해 줘서 처음 만나다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v11_group_date_intro.webp'
                },
                {
                    id: 'v11',
                    korean: '손을 잡다',
                    hint: '한 사람이 다른 사람의 손을 잡다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v12_hold_hands.webp'
                },
                {
                    id: 'v12',
                    korean: '어깨에 기대다',
                    hint: '다른 사람의 어깨에 머리를 편하게 두다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v13_lean_on_shoulder.webp'
                },
                {
                    id: 'v13',
                    korean: '얼굴이 빨개지다',
                    hint: '부끄럽거나 당황할 때 얼굴이 붉게 변하다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v14_blush.webp'
                },
                {
                    id: 'v14',
                    korean: '인상이 좋다',
                    hint: '처음 봤을 때 느껴지는 이미지가 좋다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v16_good_impression.webp'
                },
                {
                    id: 'v15',
                    korean: '조건이 맞다',
                    hint: '서로 원하는 상황이나 환경이 잘 맞다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v17_match_conditions.webp'
                },
                {
                    id: 'v16',
                    korean: '첫눈에 반하다',
                    hint: '처음 보자마자 바로 좋아하게 되다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v18_love_at_first_sight.webp'
                },
                {
                    id: 'v17',
                    korean: '팔짱을 끼다',
                    hint: '다른 사람의 팔에 자기 팔을 걸다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v19_lock_arms.webp'
                }
            ];

            const OPTION_LABELS = ['A', 'B', 'C', 'D'];
            const itemMap = new Map(vocabularyData.map(item => [item.id, item]));

            const progressText = document.getElementById('progress-text');
            const scoreText = document.getElementById('score-text');
            const progressBar = document.getElementById('progress-bar');
            const questionImage = document.getElementById('question-image');
            const feedbackBox = document.getElementById('feedback-box');
            const optionsGrid = document.getElementById('options-grid');
            const nextBtn = document.getElementById('next-btn');
            const restartBtn = document.getElementById('restart-btn');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const resultSection = document.getElementById('result-section');
            const quizStage = document.getElementById('quiz-stage');
            const speakAnswerBtn = document.getElementById('speak-answer-btn');

            const state = {
                questionSet: [],
                questionIndex: 0,
                score: 0,
                answered: false,
                results: []
            };

            function shuffleArray(array) {
                const cloned = [...array];
                for (let i = cloned.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
                }
                return cloned;
            }

            function speak(text, lang = 'ko-KR') {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.92;
                window.speechSynthesis.speak(utterance);
            }

            function buildFallbackImage(text = '이미지 없음') {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
                        <rect width="100%" height="100%" fill="#f3f4f6"/>
                        <rect x="24" y="24" width="752" height="452" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="3"/>
                        <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle"
                              font-family="Arial, Noto Sans KR, sans-serif" font-size="36" fill="#6b7280">${text}</text>
                    </svg>
                `;
                return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
            }

            function buildQuestionSet() {
                const shuffledItems = shuffleArray(vocabularyData);
                return shuffledItems.map(correctItem => {
                    const distractors = shuffleArray(
                        vocabularyData.filter(item => item.id !== correctItem.id)
                    ).slice(0, 3);

                    const choices = shuffleArray([correctItem, ...distractors]).map(item => item.id);

                    return {
                        itemId: correctItem.id,
                        choiceIds: choices
                    };
                });
            }

            function setImageSource(imgEl, src, altText) {
                imgEl.alt = altText;
                imgEl.onerror = () => {
                    imgEl.onerror = null;
                    imgEl.src = buildFallbackImage('이미지 없음');
                };
                imgEl.src = src || buildFallbackImage('이미지 없음');
            }

            function renderFeedback(correctItem, selectedItem, isCorrect) {
                feedbackBox.classList.remove('hidden');
                feedbackBox.classList.add('feedback-enter');

                if (isCorrect) {
                    feedbackBox.className = 'mt-4 rounded-2xl border p-4 feedback-enter border-emerald-200 bg-emerald-50';
                    feedbackBox.innerHTML = `
                        <p class="text-sm font-bold text-emerald-700">정답입니다.</p>
                        <div class="mt-2 text-sm leading-6 text-gray-700">
                            <div><span class="font-bold text-gray-900">${correctItem.korean}</span></div>
                            <p class="mt-2 text-gray-600">${correctItem.hint}</p>
                        </div>
                    `;
                } else {
                    feedbackBox.className = 'mt-4 rounded-2xl border p-4 feedback-enter border-rose-200 bg-rose-50';
                    feedbackBox.innerHTML = `
                        <p class="text-sm font-bold text-rose-700">틀렸습니다.</p>
                        <div class="mt-2 text-sm leading-6 text-gray-700">
                            <p>정답은 다음과 같습니다.</p>
                            <div class="mt-1"><span class="font-bold text-gray-900">${correctItem.korean}</span></div>
                            <p class="mt-2 text-gray-600">${correctItem.hint}</p>
                            <p class="mt-3 text-sm text-gray-600">내가 고른 답: <span class="font-semibold text-rose-700">${selectedItem.korean}</span></p>
                        </div>
                    `;
                }

                speakAnswerBtn.classList.remove('hidden');
            }

            function renderQuestion() {
                if (state.questionIndex >= state.questionSet.length) {
                    renderResult();
                    return;
                }

                quizStage.classList.remove('hidden');
                resultSection.classList.add('hidden');

                const total = state.questionSet.length;
                const currentQ = state.questionSet[state.questionIndex];
                const correctItem = itemMap.get(currentQ.itemId);
                const selectedResult = state.results[state.questionIndex] || null;

                progressText.textContent = `${state.questionIndex + 1} / ${total}`;
                scoreText.textContent = `${state.score}`;
                progressBar.style.width = `${((state.questionIndex) / total) * 100}%`;

                setImageSource(
                    questionImage,
                    correctItem.image,
                    `${correctItem.korean} 관련 이미지`
                );

                feedbackBox.classList.add('hidden');
                feedbackBox.innerHTML = '';
                speakAnswerBtn.classList.add('hidden');
                nextBtn.classList.toggle('hidden', !state.answered);

                optionsGrid.innerHTML = '';

                currentQ.choiceIds.forEach((choiceId, index) => {
                    const choiceItem = itemMap.get(choiceId);
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'option-btn w-full text-left rounded-2xl border border-gray-200 bg-white px-4 py-4 shadow-sm';
                    btn.disabled = state.answered;

                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-3';

                    const badge = document.createElement('span');
                    badge.className = 'option-badge bg-gray-100 text-gray-700';
                    badge.textContent = OPTION_LABELS[index];

                    const textWrap = document.createElement('div');
                    textWrap.className = 'min-w-0 flex-1';

                    const label = document.createElement('p');
                    label.className = 'font-bold text-gray-900 break-keep';
                    label.textContent = choiceItem.korean;

                    textWrap.appendChild(label);

                    row.appendChild(badge);
                    row.appendChild(textWrap);

                    if (state.answered && selectedResult) {
                        const icon = document.createElement('i');
                        icon.className = 'text-xl shrink-0';

                        if (choiceId === currentQ.itemId) {
                            btn.classList.add('border-emerald-500', 'bg-emerald-50');
                            badge.className = 'option-badge bg-emerald-100 text-emerald-700';
                            icon.className = 'ph ph-check-circle text-xl shrink-0 text-emerald-600';
                            row.appendChild(icon);
                        } else if (choiceId === selectedResult.selectedId && !selectedResult.isCorrect) {
                            btn.classList.add('border-rose-500', 'bg-rose-50');
                            badge.className = 'option-badge bg-rose-100 text-rose-700';
                            icon.className = 'ph ph-x-circle text-xl shrink-0 text-rose-600';
                            row.appendChild(icon);
                        } else {
                            btn.classList.add('opacity-70');
                        }
                    } else {
                        btn.addEventListener('click', () => handleAnswer(choiceId));
                    }

                    btn.appendChild(row);
                    optionsGrid.appendChild(btn);
                });

                if (state.answered && selectedResult) {
                    const selectedItem = itemMap.get(selectedResult.selectedId);
                    renderFeedback(correctItem, selectedItem, selectedResult.isCorrect);
                    progressBar.style.width = `${((state.questionIndex + 1) / total) * 100}%`;
                }
            }

            function handleAnswer(selectedId) {
                if (state.answered) return;

                const currentQ = state.questionSet[state.questionIndex];
                const isCorrect = selectedId === currentQ.itemId;

                state.answered = true;
                if (isCorrect) state.score += 1;

                state.results[state.questionIndex] = {
                    itemId: currentQ.itemId,
                    selectedId,
                    isCorrect
                };

                if (navigator.vibrate) {
                    navigator.vibrate(isCorrect ? 18 : [20, 50, 20]);
                }

                renderQuestion();
            }

            function renderResult() {
                quizStage.classList.add('hidden');
                resultSection.classList.remove('hidden');

                const total = state.questionSet.length;
                const accuracy = total ? Math.round((state.score / total) * 100) : 0;
                const wrongAnswers = state.results.filter(result => !result.isCorrect);

                resultSection.innerHTML = `
                    <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-6 sm:p-8">
                        <div class="text-center">
                            <p class="text-sm uppercase tracking-[0.22em] text-gray-400">완료</p>
                            <h2 class="mt-2 text-2xl sm:text-3xl font-extrabold text-gray-900">${state.score} / ${total}</h2>
                            <p class="mt-2 text-gray-600">정답률 ${accuracy}%</p>
                        </div>

                        <div class="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div class="rounded-2xl bg-gray-50 border border-gray-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-gray-400">전체</p>
                                <p class="mt-2 text-xl font-extrabold text-gray-900">${total}</p>
                            </div>
                            <div class="rounded-2xl bg-emerald-50 border border-emerald-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-emerald-600">정답</p>
                                <p class="mt-2 text-xl font-extrabold text-emerald-700">${state.score}</p>
                            </div>
                            <div class="rounded-2xl bg-rose-50 border border-rose-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-rose-600">오답</p>
                                <p class="mt-2 text-xl font-extrabold text-rose-700">${wrongAnswers.length}</p>
                            </div>
                        </div>

                        <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
                            <button id="retry-same-btn" type="button" class="px-5 py-3 rounded-2xl bg-gray-900 text-white font-bold hover:bg-black transition">
                                다시 풀기
                            </button>
                            <button id="retry-shuffle-btn" type="button" class="px-5 py-3 rounded-2xl bg-white border border-gray-300 text-gray-800 font-bold hover:bg-gray-50 transition">
                                섞어서 다시
                            </button>
                        </div>
                    </div>

                    ${
                        wrongAnswers.length
                            ? `
                            <div class="mt-6 bg-white border border-gray-200 rounded-3xl shadow-sm p-5 sm:p-6">
                                <h3 class="text-xl font-extrabold text-gray-900">틀린 문제 다시 보기</h3>

                                <div class="mt-5 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                    ${wrongAnswers.map(result => {
                                        const correctItem = itemMap.get(result.itemId);
                                        const selectedItem = itemMap.get(result.selectedId);

                                        return `
                                            <article class="border border-gray-200 rounded-2xl overflow-hidden bg-white">
                                                <img
                                                    src="${correctItem.image}"
                                                    alt="${correctItem.korean} 관련 이미지"
                                                    class="result-thumb"
                                                    onerror="this.onerror=null; this.src='${buildFallbackImage('이미지 없음')}'"
                                                    loading="lazy"
                                                />
                                                <div class="p-4">
                                                    <p class="text-xs uppercase tracking-[0.18em] text-gray-400">정답</p>
                                                    <p class="mt-1 font-bold text-gray-900">${correctItem.korean}</p>

                                                    <p class="mt-4 text-xs uppercase tracking-[0.18em] text-gray-400">내 답</p>
                                                    <p class="mt-1 font-semibold text-rose-700">${selectedItem ? selectedItem.korean : '선택 안 함'}</p>

                                                    <p class="mt-4 text-sm text-gray-600">${correctItem.hint}</p>
                                                </div>
                                            </article>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                            `
                            : `
                            <div class="mt-6 bg-white border border-emerald-200 rounded-3xl shadow-sm p-6 text-center">
                                <p class="text-lg font-extrabold text-emerald-700">모든 문제를 맞혔습니다.</p>
                            </div>
                            `
                    }
                `;

                document.getElementById('retry-same-btn').addEventListener('click', () => resetQuiz(false));
                document.getElementById('retry-shuffle-btn').addEventListener('click', () => resetQuiz(true));
            }

            function resetQuiz(rebuild = true) {
                if (rebuild || !state.questionSet.length) {
                    state.questionSet = buildQuestionSet();
                }

                state.questionIndex = 0;
                state.score = 0;
                state.answered = false;
                state.results = [];
                renderQuestion();
            }

            function goNext() {
                if (!state.answered) return;
                state.questionIndex += 1;
                state.answered = false;
                renderQuestion();
            }

            nextBtn.addEventListener('click', goNext);
            restartBtn.addEventListener('click', () => resetQuiz(false));
            shuffleBtn.addEventListener('click', () => resetQuiz(true));

            speakAnswerBtn.addEventListener('click', () => {
                const currentQ = state.questionSet[state.questionIndex];
                if (!currentQ) return;
                const correctItem = itemMap.get(currentQ.itemId);
                speak(correctItem.korean, 'ko-KR');
            });

            resetQuiz(true);
        });
    </script>

    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
