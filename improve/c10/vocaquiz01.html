<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>10과 사진 어휘 4지선다 퀴즈</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Noto Sans KR', 'Noto Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
        }

        .sticky-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .lang-btn.active {
            transform: scale(1.04);
            box-shadow: 0 0 0 2px rgba(255,255,255,1), 0 0 14px rgba(0,0,0,0.15);
            font-weight: 700;
        }

        .quiz-image {
            width: 100%;
            height: clamp(240px, 46vw, 430px);
            object-fit: cover;
            background: #ffffff;
        }

        .option-btn {
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -12px rgba(0,0,0,0.22);
        }

        .option-badge {
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .feedback-enter {
            animation: fadeIn 0.22s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-thumb {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #fff;
        }

        .injected-global-nav {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e0e7ff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 999999;
            box-sizing: border-box;
            gap: 15px;
        }

        .injected-global-nav a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: color 0.2s;
        }

        .injected-global-nav a:hover {
            color: #3730a3;
        }

        .injected-global-nav .divider {
            color: #cbd5e1;
        }
    </style>
</head>

<body class="bg-indigo-50 min-h-screen flex flex-col transition-colors duration-500">
    <nav id="injected-global-nav" class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>

    <header class="sticky-header sticky top-[60px] z-50 px-4 py-3 shadow-sm">

                    <p class="text-sm text-gray-500 mt-1">사진을 보고 알맞은 어휘를 고르는 4지선다 퀴즈</p>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">

    <main class="w-full flex-1 px-4 pb-12">

                    <div class="p-5 border-b border-gray-100">

                            <div>
                                <p class="text-xs uppercase tracking-[0.18em] text-gray-400">Progress</p>
                                <h2 id="progress-text" class="text-lg sm:text-xl font-extrabold text-gray-900 mt-1">1 / 17</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-xs uppercase tracking-[0.18em] text-gray-400">Score</p>
                                <p id="score-text" class="text-lg sm:text-xl font-extrabold text-gray-900 mt-1">0</p>
                            </div>

                        <div class="mt-4 w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>

                    <div class="p-4 sm:p-5">
                        <div class="rounded-3xl overflow-hidden border border-gray-200 bg-gray-50">
                            <img id="question-image" class="quiz-image" src="" alt="문항 이미지" />
                        </div>

                        <div class="mt-4 flex items-start justify-between gap-3">
                            <div>
                                <p class="text-base font-bold text-gray-900">사진을 보고 알맞은 어휘를 고르세요.</p>
                                <p class="text-sm text-gray-500 mt-1">보기 언어를 바꿔도 현재 점수와 문제 순서는 유지됩니다.</p>
                            </div>

                    hint: '서로 원하는 상황이나 환경이 잘 맞다.',

                },
                {

                    korean: '첫눈에 반하다',
                    vietnamese: 'yêu từ cái nhìn đầu tiên',
                    japanese: '一目惚れする',
                    chinese: '一见钟情',
                    hint: '처음 보자마자 바로 좋아하게 되다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v18_love_at_first_sight.webp'
                },
                {
                    id: 'v17',
                    korean: '팔짱을 끼다',
                    vietnamese: 'khoác tay',
                    japanese: '腕を組む',
                    chinese: '挽着胳膊',
                    hint: '다른 사람의 팔에 자기 팔을 걸다.',
                    image: '../imagesource/split_text_hidden_mobile_vocab/v19_lock_arms.webp'
                }
            ];

            const LANG_META = {
                korean: {
                    label: '한국어',
                    theme: 'indigo',
                    pillClass: 'bg-indigo-100 text-indigo-700',
                    bodyClass: 'bg-indigo-50',
                    titleClass: 'text-indigo-600',
                    progressClass: 'bg-indigo-500'
                },
                vietnamese: {
                    label: '베트남어',
                    theme: 'green',
                    pillClass: 'bg-green-100 text-green-700',
                    bodyClass: 'bg-green-50',
                    titleClass: 'text-green-600',
                    progressClass: 'bg-green-500'
                },
                japanese: {
                    label: '일본어',
                    theme: 'blue',
                    pillClass: 'bg-blue-100 text-blue-700',
                    bodyClass: 'bg-blue-50',
                    titleClass: 'text-blue-600',
                    progressClass: 'bg-blue-500'
                },
                chinese: {
                    label: '중국어',
                    theme: 'red',
                    pillClass: 'bg-red-100 text-red-700',
                    bodyClass: 'bg-red-50',
                    titleClass: 'text-red-600',
                    progressClass: 'bg-red-500'
                }
            };

            const OPTION_LABELS = ['A', 'B', 'C', 'D'];
            const itemMap = new Map(vocabularyData.map(item => [item.id, item]));

            const body = document.body;
            const titleText = document.getElementById('title-text');
            const progressText = document.getElementById('progress-text');
            const scoreText = document.getElementById('score-text');
            const progressBar = document.getElementById('progress-bar');
            const questionImage = document.getElementById('question-image');
            const feedbackBox = document.getElementById('feedback-box');
            const optionsGrid = document.getElementById('options-grid');
            const nextBtn = document.getElementById('next-btn');
            const restartBtn = document.getElementById('restart-btn');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const resultSection = document.getElementById('result-section');
            const quizStage = document.getElementById('quiz-stage');
            const speakAnswerBtn = document.getElementById('speak-answer-btn');
            const choiceLangLabel = document.getElementById('choice-lang-label');
            const langButtons = Array.from(document.querySelectorAll('.lang-btn'));

            const state = {
                currentLang: 'korean',
                questionSet: [],
                questionIndex: 0,
                score: 0,
                answered: false,
                results: []
            };

            function shuffleArray(array) {
                const cloned = [...array];
                for (let i = cloned.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
                }
                return cloned;
            }

            function speak(text, lang = 'ko-KR') {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.92;
                window.speechSynthesis.speak(utterance);
            }

            function buildFallbackImage(text = '이미지 없음') {
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="800" height="500">
                        <rect width="100%" height="100%" fill="#f3f4f6"/>
                        <rect x="24" y="24" width="752" height="452" rx="24" fill="#ffffff" stroke="#d1d5db" stroke-width="3"/>
                        <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle"
                              font-family="Arial, Noto Sans KR, sans-serif" font-size="36" fill="#6b7280">${text}</text>
                    </svg>
                `;
                return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
            }

            function getChoiceText(item) {
                if (state.currentLang === 'korean') return item.korean;
                return item[state.currentLang];
            }

            function getKoreanAndSupportText(item) {
                if (state.currentLang === 'korean') {
                    return `<span class="font-bold text-gray-900">${item.korean}</span>`;
                }
                return `
                    <span class="font-bold text-gray-900">${item.korean}</span>
                    <span class="block text-sm text-gray-500 mt-1">${item[state.currentLang]}</span>
                `;
            }

            function buildQuestionSet() {
                const shuffledItems = shuffleArray(vocabularyData);
                return shuffledItems.map(correctItem => {
                    const distractors = shuffleArray(
                        vocabularyData.filter(item => item.id !== correctItem.id)
                    ).slice(0, 3);

                    const choices = shuffleArray([correctItem, ...distractors]).map(item => item.id);

                    return {
                        itemId: correctItem.id,
                        choiceIds: choices
                    };
                });
            }

            function applyTheme() {
                const meta = LANG_META[state.currentLang];

                body.className = `min-h-screen flex flex-col transition-colors duration-500 ${meta.bodyClass}`;
                titleText.className = `text-xl sm:text-2xl font-extrabold leading-tight ${meta.titleClass}`;
                progressBar.className = `h-full rounded-full transition-all duration-300 ${meta.progressClass}`;
                choiceLangLabel.className = `inline-flex items-center rounded-full px-3 py-1 text-xs font-bold ${meta.pillClass}`;
                choiceLangLabel.textContent = `${meta.label} 보기`;

                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === state.currentLang);
                });
            }

            function setImageSource(imgEl, src, altText) {
                imgEl.alt = altText;
                imgEl.onerror = () => {
                    imgEl.onerror = null;
                    imgEl.src = buildFallbackImage('이미지 없음');
                };
                imgEl.src = src || buildFallbackImage('이미지 없음');
            }

            function renderFeedback(correctItem, selectedItem, isCorrect) {
                feedbackBox.classList.remove('hidden');
                feedbackBox.classList.add('feedback-enter');

                if (isCorrect) {
                    feedbackBox.className = 'mt-4 rounded-2xl border p-4 feedback-enter border-emerald-200 bg-emerald-50';
                    feedbackBox.innerHTML = `
                        <p class="text-sm font-bold text-emerald-700">정답입니다.</p>
                        <div class="mt-2 text-sm leading-6 text-gray-700">
                            <div>${getKoreanAndSupportText(correctItem)}</div>
                            <p class="mt-2 text-gray-600">${correctItem.hint}</p>
                        </div>
                    `;
                } else {
                    feedbackBox.className = 'mt-4 rounded-2xl border p-4 feedback-enter border-rose-200 bg-rose-50';
                    feedbackBox.innerHTML = `
                        <p class="text-sm font-bold text-rose-700">틀렸습니다.</p>
                        <div class="mt-2 text-sm leading-6 text-gray-700">
                            <p>정답은 다음과 같습니다.</p>
                            <div class="mt-1">${getKoreanAndSupportText(correctItem)}</div>
                            <p class="mt-2 text-gray-600">${correctItem.hint}</p>
                            <p class="mt-3 text-sm text-gray-600">내가 고른 답: <span class="font-semibold text-rose-700">${getChoiceText(selectedItem)}</span></p>
                        </div>
                    `;
                }

                speakAnswerBtn.classList.remove('hidden');
            }

            function renderQuestion() {
                if (state.questionIndex >= state.questionSet.length) {
                    renderResult();
                    return;
                }

                quizStage.classList.remove('hidden');
                resultSection.classList.add('hidden');

                const total = state.questionSet.length;
                const currentQ = state.questionSet[state.questionIndex];
                const correctItem = itemMap.get(currentQ.itemId);
                const selectedResult = state.results[state.questionIndex] || null;

                progressText.textContent = `${state.questionIndex + 1} / ${total}`;
                scoreText.textContent = `${state.score}`;
                progressBar.style.width = `${((state.questionIndex) / total) * 100}%`;

                setImageSource(
                    questionImage,
                    correctItem.image,
                    `${correctItem.korean} 관련 이미지`
                );

                feedbackBox.classList.add('hidden');
                feedbackBox.innerHTML = '';
                speakAnswerBtn.classList.add('hidden');
                nextBtn.classList.toggle('hidden', !state.answered);

                optionsGrid.innerHTML = '';

                currentQ.choiceIds.forEach((choiceId, index) => {
                    const choiceItem = itemMap.get(choiceId);
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'option-btn w-full text-left rounded-2xl border border-gray-200 bg-white px-4 py-4 shadow-sm';
                    btn.disabled = state.answered;

                    const row = document.createElement('div');
                    row.className = 'flex items-center gap-3';

                    const badge = document.createElement('span');
                    badge.className = 'option-badge bg-gray-100 text-gray-700';
                    badge.textContent = OPTION_LABELS[index];

                    const textWrap = document.createElement('div');
                    textWrap.className = 'min-w-0 flex-1';

                    const label = document.createElement('p');
                    label.className = 'font-bold text-gray-900 break-keep';
                    label.textContent = getChoiceText(choiceItem);

                    textWrap.appendChild(label);

                    if (state.currentLang !== 'korean') {
                        const sub = document.createElement('p');
                        sub.className = 'text-xs text-gray-500 mt-1';
                        sub.textContent = choiceItem.korean;
                        textWrap.appendChild(sub);
                    }

                    row.appendChild(badge);
                    row.appendChild(textWrap);

                    if (state.answered && selectedResult) {
                        const icon = document.createElement('i');
                        icon.className = 'text-xl shrink-0';

                        if (choiceId === currentQ.itemId) {
                            btn.classList.add('border-emerald-500', 'bg-emerald-50');
                            badge.className = 'option-badge bg-emerald-100 text-emerald-700';
                            icon.className = 'ph ph-check-circle text-xl shrink-0 text-emerald-600';
                            row.appendChild(icon);
                        } else if (choiceId === selectedResult.selectedId && !selectedResult.isCorrect) {
                            btn.classList.add('border-rose-500', 'bg-rose-50');
                            badge.className = 'option-badge bg-rose-100 text-rose-700';
                            icon.className = 'ph ph-x-circle text-xl shrink-0 text-rose-600';
                            row.appendChild(icon);
                        } else {
                            btn.classList.add('opacity-70');
                        }
                    } else {
                        btn.addEventListener('click', () => handleAnswer(choiceId));
                    }

                    btn.appendChild(row);
                    optionsGrid.appendChild(btn);
                });

                if (state.answered && selectedResult) {
                    const selectedItem = itemMap.get(selectedResult.selectedId);
                    renderFeedback(correctItem, selectedItem, selectedResult.isCorrect);
                    progressBar.style.width = `${((state.questionIndex + 1) / total) * 100}%`;
                }
            }

            function handleAnswer(selectedId) {
                if (state.answered) return;

                const currentQ = state.questionSet[state.questionIndex];
                const isCorrect = selectedId === currentQ.itemId;

                state.answered = true;
                if (isCorrect) state.score += 1;

                state.results[state.questionIndex] = {
                    itemId: currentQ.itemId,
                    selectedId,
                    isCorrect
                };

                if (navigator.vibrate) {
                    navigator.vibrate(isCorrect ? 18 : [20, 50, 20]);
                }

                renderQuestion();
            }

            function renderResult() {
                quizStage.classList.add('hidden');
                resultSection.classList.remove('hidden');

                const total = state.questionSet.length;
                const accuracy = total ? Math.round((state.score / total) * 100) : 0;
                const wrongAnswers = state.results.filter(result => !result.isCorrect);

                resultSection.innerHTML = `
                    <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-6 sm:p-8">
                        <div class="text-center">
                            <p class="text-sm uppercase tracking-[0.22em] text-gray-400">Quiz Completed</p>
                            <h2 class="mt-2 text-2xl sm:text-3xl font-extrabold text-gray-900">${state.score} / ${total}</h2>
                            <p class="mt-2 text-gray-600">정답률 ${accuracy}%</p>
                        </div>

                        <div class="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div class="rounded-2xl bg-gray-50 border border-gray-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-gray-400">Total</p>
                                <p class="mt-2 text-xl font-extrabold text-gray-900">${total}</p>
                            </div>
                            <div class="rounded-2xl bg-emerald-50 border border-emerald-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-emerald-600">Correct</p>
                                <p class="mt-2 text-xl font-extrabold text-emerald-700">${state.score}</p>
                            </div>
                            <div class="rounded-2xl bg-rose-50 border border-rose-200 p-4 text-center">
                                <p class="text-xs uppercase tracking-[0.2em] text-rose-600">Wrong</p>
                                <p class="mt-2 text-xl font-extrabold text-rose-700">${wrongAnswers.length}</p>
                            </div>
                        </div>

                        <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
                            <button id="retry-same-btn" type="button" class="px-5 py-3 rounded-2xl bg-gray-900 text-white font-bold hover:bg-black transition">
                                같은 순서로 다시 풀기
                            </button>
                            <button id="retry-shuffle-btn" type="button" class="px-5 py-3 rounded-2xl bg-white border border-gray-300 text-gray-800 font-bold hover:bg-gray-50 transition">
                                문항 섞어서 다시 풀기
                            </button>
                        </div>
                    </div>

                    ${
                        wrongAnswers.length
                            ? `
                            <div class="mt-6 bg-white border border-gray-200 rounded-3xl shadow-sm p-5 sm:p-6">
                                <h3 class="text-xl font-extrabold text-gray-900">틀린 문제 다시 보기</h3>
                                <p class="text-sm text-gray-500 mt-1">정답과 내가 고른 답을 비교할 수 있습니다.</p>

                                <div class="mt-5 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                    ${wrongAnswers.map(result => {
                                        const correctItem = itemMap.get(result.itemId);
                                        const selectedItem = itemMap.get(result.selectedId);

                                        return `
                                            <article class="border border-gray-200 rounded-2xl overflow-hidden bg-white">
                                                <img
                                                    src="${correctItem.image}"
                                                    alt="${correctItem.korean} 관련 이미지"
                                                    class="result-thumb"
                                                    onerror="this.onerror=null; this.src='${buildFallbackImage('이미지 없음')}'"
                                                    loading="lazy"
                                                />
                                                <div class="p-4">
                                                    <p class="text-xs uppercase tracking-[0.18em] text-gray-400">정답</p>
                                                    <p class="mt-1 font-bold text-gray-900">${correctItem.korean}</p>
                                                    ${
                                                        state.currentLang !== 'korean'
                                                            ? `<p class="text-sm text-gray-500 mt-1">${correctItem[state.currentLang]}</p>`
                                                            : ''
                                                    }

                                                    <p class="mt-4 text-xs uppercase tracking-[0.18em] text-gray-400">내 답</p>
                                                    <p class="mt-1 font-semibold text-rose-700">${selectedItem ? getChoiceText(selectedItem) : '선택 안 함'}</p>

                                                    <p class="mt-4 text-sm text-gray-600">${correctItem.hint}</p>
                                                </div>
                                            </article>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                            `
                            : `
                            <div class="mt-6 bg-white border border-emerald-200 rounded-3xl shadow-sm p-6 text-center">
                                <p class="text-lg font-extrabold text-emerald-700">모든 문제를 맞혔습니다.</p>
                            </div>
                            `
                    }
                `;

                document.getElementById('retry-same-btn').addEventListener('click', () => resetQuiz(false));
                document.getElementById('retry-shuffle-btn').addEventListener('click', () => resetQuiz(true));
            }

            function resetQuiz(rebuild = true) {
                if (rebuild || !state.questionSet.length) {
                    state.questionSet = buildQuestionSet();
                }

                state.questionIndex = 0;
                state.score = 0;
                state.answered = false;
                state.results = [];
                renderQuestion();
            }

            function goNext() {
                if (!state.answered) return;
                state.questionIndex += 1;
                state.answered = false;
                renderQuestion();
            }

            langButtons.forEach(button => {
                button.addEventListener('click', () => {
                    state.currentLang = button.dataset.lang;
                    applyTheme();

                    if (state.questionIndex >= state.questionSet.length && state.questionSet.length) {
                        renderResult();
                    } else {
                        renderQuestion();
                    }
                });
            });

            nextBtn.addEventListener('click', goNext);
            restartBtn.addEventListener('click', () => resetQuiz(false));
            shuffleBtn.addEventListener('click', () => resetQuiz(true));

            speakAnswerBtn.addEventListener('click', () => {
                const currentQ = state.questionSet[state.questionIndex];
                if (!currentQ) return;
                const correctItem = itemMap.get(currentQ.itemId);
                speak(correctItem.korean, 'ko-KR');
            });

            applyTheme();
            resetQuiz(true);
        });
    </script>

    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
