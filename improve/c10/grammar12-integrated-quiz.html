<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>문법 1+2 통합 퀴즈 (모바일)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
        .injected-global-nav {
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            height: 58px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 14px;
            position: sticky;
            top: 0;
            z-index: 9999;
            box-sizing: border-box;
        }
        .injected-global-nav a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #1d4ed8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 800;
        }
        .injected-global-nav .divider { color: #94a3b8; }
        .option-btn { min-height: 52px; }
        .record-btn { min-height: 54px; }
        .safe-wrap { word-break: keep-all; overflow-wrap: break-word; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen max-w-md mx-auto shadow-xl">
    <nav class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>
    </nav>

    <main id="app" class="p-4 pb-8"></main>

    <script>
        const STORAGE_KEY = "c10.grammar12.integrated.history.v1";
        const MAX_HISTORY = 40;

        const QUESTION_BANK = [
            {
                id: "g1_01",
                grammar: "-던",
                type: "mcq",
                prompt: "내가 아까 ____ 커피가 어디 갔지?",
                options: ["마시던", "마신", "마시는"],
                answer: "마시던",
                correctFeedback: "정답입니다.",
                wrongFeedback: "이 문장은 아직 끝나지 않은 과거 행동(마시다 중단)을 떠올리는 상황입니다.",
                ruleHint: "과거 반복/미완료 회상은 '-던'을 씁니다."
            },
            {
                id: "g1_02",
                grammar: "-던",
                type: "mcq",
                prompt: "어릴 때 자주 ____ 놀이터예요.",
                options: ["가던", "간", "가는"],
                answer: "가던",
                correctFeedback: "정답입니다.",
                wrongFeedback: "어릴 때의 반복 습관을 말하므로 현재형이나 완료형이 아니라 회상형이 필요합니다.",
                ruleHint: "과거에 자주 하던 습관 = '-던'."
            },
            {
                id: "g1_03",
                grammar: "-던",
                type: "mcq",
                prompt: "지난주에 ____ 영화가 정말 슬펐어요.",
                options: ["보던", "봤던", "보는"],
                answer: "봤던",
                correctFeedback: "정답입니다.",
                wrongFeedback: "영화 시청은 이미 끝난 경험이므로 미완료 회상 '-던'보다 완료 경험형이 자연스럽습니다.",
                ruleHint: "완료된 과거 경험은 보통 '-았/었던' 계열을 씁니다."
            },
            {
                id: "g1_04",
                grammar: "-던",
                type: "short",
                prompt: "엄마가 젊을 때 자주 ____ 치마예요. (입다)",
                answers: ["입던"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "과거에 반복해서 입은 습관을 회상하는 문맥입니다.",
                ruleHint: "동사 어간 + '-던' 형태를 사용합니다."
            },
            {
                id: "g1_05",
                grammar: "-던",
                type: "short",
                prompt: "제가 읽다가 만 ____ 소설이에요. (읽다)",
                answers: ["읽던"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "문장에서 '읽다가 만'은 미완료를 직접 보여주므로 '-던'이 맞습니다.",
                ruleHint: "중단된 과거 행동은 '-던'을 사용합니다."
            },
            {
                id: "g1_06",
                grammar: "-던",
                type: "mcq",
                prompt: "요즘 매일 ____ 뉴스예요.",
                options: ["보던", "봤던", "보는"],
                answer: "보는",
                correctFeedback: "정답입니다.",
                wrongFeedback: "'요즘 매일'은 현재 습관이므로 과거 회상 표현 '-던'이 맞지 않습니다.",
                ruleHint: "현재 습관/사실은 '-는' 관형형을 씁니다."
            },
            {
                id: "g1_07",
                grammar: "-던",
                type: "short",
                prompt: "작년에 제가 ____ 동네가 지금 많이 변했어요. (살다)",
                answers: ["살던"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "작년의 거주 상태를 회상하는 문맥이므로 '-던'이 자연스럽습니다.",
                ruleHint: "과거의 상태를 떠올릴 때 '-던'을 사용합니다."
            },
            {
                id: "g2_01",
                grammar: "-잖아요",
                type: "mcq",
                prompt: "오늘은 일찍 가요. 내일 시험 ____.",
                options: ["있잖아요", "있거든요", "있죠"],
                answer: "있잖아요",
                correctFeedback: "정답입니다.",
                wrongFeedback: "상대도 이미 아는 사실(시험 일정)을 상기시키는 문맥입니다.",
                ruleHint: "공유된 정보를 확인/상기할 때 '-잖아요'."
            },
            {
                id: "g2_02",
                grammar: "-잖아요",
                type: "mcq",
                prompt: "오늘은 못 가요. 일이 너무 많____.",
                options: ["잖아요", "거든요", "죠"],
                answer: "거든요",
                correctFeedback: "정답입니다.",
                wrongFeedback: "이 문장은 상대가 모를 수 있는 새로운 이유를 설명하는 상황입니다.",
                ruleHint: "새 이유 설명은 '-거든요'가 자연스럽고, '-잖아요'는 공유지식 전제입니다."
            },
            {
                id: "g2_03",
                grammar: "-잖아요",
                type: "short",
                prompt: "민수 씨는 ____ 다들 알고 있잖아요. (의사)",
                answers: ["의사잖아요"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "받침 없는 명사 뒤에서는 '잖아요'를 붙이는 형태가 기본입니다.",
                ruleHint: "명사(받침 X) + 잖아요"
            },
            {
                id: "g2_04",
                grammar: "-잖아요",
                type: "short",
                prompt: "오늘은 ____ 회의 있는 날이에요. (월요일)",
                answers: ["월요일이잖아요"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "'월요일'은 받침 있는 명사라 '이잖아요'를 써야 합니다.",
                ruleHint: "명사(받침 O) + 이잖아요"
            },
            {
                id: "g2_05",
                grammar: "-잖아요",
                type: "mcq",
                prompt: "우리 내일 9시에 만나기로 했___?",
                options: ["잖아요", "거든요", "죠"],
                answer: "죠",
                correctFeedback: "정답입니다.",
                wrongFeedback: "이 문장은 상대 동의를 묻는 질문이라 단정형 '-잖아요'보다 확인 질문형이 맞습니다.",
                ruleHint: "동의 확인 질문은 '-죠?'가 자연스럽습니다."
            },
            {
                id: "g2_06",
                grammar: "-잖아요",
                type: "mcq",
                prompt: "제가 아까 문자 보냈____. 확인해 보세요.",
                options: ["잖아요", "거든요", "죠"],
                answer: "잖아요",
                correctFeedback: "정답입니다.",
                wrongFeedback: "이미 말하거나 이미 있었던 사실을 다시 상기시키는 장면입니다.",
                ruleHint: "상대가 알거나 알아야 하는 사실 상기 = '-잖아요'."
            },
            {
                id: "g2_07",
                grammar: "-잖아요",
                type: "short",
                prompt: "한국 드라마 ____ 다들 많이 보잖아요. (재미있다)",
                answers: ["재미있잖아요"],
                placeholder: "정답 입력",
                correctFeedback: "정답입니다.",
                wrongFeedback: "형용사 어간 뒤에 바로 '-잖아요'를 붙여 공유 사실을 강조합니다.",
                ruleHint: "형용사 어간 + 잖아요"
            }
        ];

        const state = {
            view: "start",
            quiz: {
                questions: [],
                index: 0,
                answers: [],
                startedAt: 0
            },
            selectedRecordId: null
        };

        function esc(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalize(text) {
            return String(text || "").replace(/\s+/g, "").trim();
        }

        function shuffle(list) {
            const arr = [...list];
            for (let i = arr.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadHistory() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (err) {
                return [];
            }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            } catch (err) {
                // ignore
            }
        }

        function formatDate(iso) {
            try {
                const d = new Date(iso);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");
                const hh = String(d.getHours()).padStart(2, "0");
                const mm = String(d.getMinutes()).padStart(2, "0");
                return `${y}-${m}-${day} ${hh}:${mm}`;
            } catch (err) {
                return iso;
            }
        }

        function bestRecord(history) {
            if (!history.length) return null;
            return history.reduce((best, cur) => {
                if (cur.percent > best.percent) return cur;
                if (cur.percent === best.percent && cur.score > best.score) return cur;
                return best;
            }, history[0]);
        }

        function currentQuestion() {
            return state.quiz.questions[state.quiz.index] || null;
        }

        function startQuiz() {
            state.quiz.questions = shuffle(QUESTION_BANK);
            state.quiz.index = 0;
            state.quiz.answers = [];
            state.quiz.startedAt = Date.now();
            state.view = "quiz";
            state.selectedRecordId = null;
            render();
            focusShortInput();
        }

        function goStart() {
            state.view = "start";
            state.selectedRecordId = null;
            render();
        }

        function openRecord(id) {
            state.view = "result";
            state.selectedRecordId = id;
            render();
        }

        function restartFromResult() {
            startQuiz();
        }

        function evaluate(q, userAnswer) {
            if (q.type === "mcq") {
                return userAnswer === q.answer;
            }
            const normalizedUser = normalize(userAnswer);
            return q.answers.some((ans) => normalize(ans) === normalizedUser);
        }

        function submitMcq(choiceIndex) {
            const q = currentQuestion();
            if (!q || q.type !== "mcq") return;
            const selected = q.options[choiceIndex];
            submitAnswer(selected);
        }

        function submitShort() {
            const q = currentQuestion();
            if (!q || q.type !== "short") return;
            const input = document.getElementById("short-answer");
            if (!input) return;
            const value = input.value.trim();
            if (!value) return;
            submitAnswer(value);
        }

        function submitAnswer(rawAnswer) {
            const q = currentQuestion();
            if (!q) return;

            const isCorrect = evaluate(q, rawAnswer);
            const answerRecord = {
                id: q.id,
                grammar: q.grammar,
                prompt: q.prompt,
                type: q.type,
                userAnswer: String(rawAnswer || ""),
                correctAnswer: q.type === "mcq" ? q.answer : q.answers[0],
                isCorrect,
                correctFeedback: q.correctFeedback,
                wrongFeedback: q.wrongFeedback,
                ruleHint: q.ruleHint
            };

            state.quiz.answers.push(answerRecord);

            if (state.quiz.index < state.quiz.questions.length - 1) {
                state.quiz.index += 1;
                render();
                focusShortInput();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            const total = state.quiz.answers.length;
            const score = state.quiz.answers.filter((a) => a.isCorrect).length;
            const percent = total ? Math.round((score / total) * 100) : 0;
            const durationSec = Math.max(1, Math.round((Date.now() - state.quiz.startedAt) / 1000));

            const attempt = {
                id: `rec-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                completedAt: new Date().toISOString(),
                score,
                total,
                percent,
                durationSec,
                answers: state.quiz.answers
            };

            const history = loadHistory();
            history.unshift(attempt);
            if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
            saveHistory(history);

            state.selectedRecordId = attempt.id;
            state.view = "result";
            render();
        }

        function resultById(id) {
            const history = loadHistory();
            return history.find((h) => h.id === id) || null;
        }

        function focusShortInput() {
            const q = currentQuestion();
            if (!q || q.type !== "short") return;
            const input = document.getElementById("short-answer");
            if (input) input.focus();
        }

        function renderStart() {
            const history = loadHistory();
            const best = bestRecord(history);

            const historyHtml = history.length
                ? history.map((r, idx) => `
                    <button type="button" onclick="openRecord('${r.id}')" class="record-btn w-full border border-slate-200 bg-white rounded-xl px-3 py-2 text-left hover:border-blue-300 transition">
                        <p class="text-xs text-slate-500">${idx + 1}회차 · ${formatDate(r.completedAt)}</p>
                        <p class="text-sm font-bold text-slate-800 mt-0.5">${r.score}/${r.total} (${r.percent}%)</p>
                    </button>
                `).join("")
                : `<p class="text-sm text-slate-500">아직 응시 기록이 없습니다.</p>`;

            return `
                <section class="space-y-4">
                    <div class="bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-2xl p-5 shadow-sm">
                        <h1 class="text-xl font-black text-blue-700 safe-wrap">문법 1+2 통합 퀴즈</h1>
                        <p class="text-sm text-slate-700 mt-2">-던 / -잖아요를 섞어 연습합니다. 객관식은 선택 즉시 다음 문제로 이동합니다.</p>
                        <p class="text-xs text-slate-500 mt-1">주관식은 답 입력 후 Enter 또는 입력 완료 버튼만 누르면 됩니다.</p>
                        <div class="mt-4 grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">문항 수</p>
                                <p class="font-bold text-slate-800">${QUESTION_BANK.length}문항</p>
                            </div>
                            <div class="bg-white border border-blue-100 rounded-lg p-2">
                                <p class="text-slate-500">최고 기록</p>
                                <p class="font-bold text-slate-800">${best ? `${best.score}/${best.total} (${best.percent}%)` : "없음"}</p>
                            </div>
                        </div>
                        <a href="grammar12-ox-warmup.html" class="mt-4 w-full border border-blue-300 text-blue-700 bg-blue-50 py-2.5 rounded-xl font-bold text-sm text-center no-underline block">O/X 워밍업 먼저 하기</a>
                        <button type="button" onclick="startQuiz()" class="mt-2 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700">
                            퀴즈 시작
                        </button>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-800 mb-3">과거 응시 기록</h2>
                        <div class="space-y-2">${historyHtml}</div>
                    </div>
                </section>
            `;
        }

        function renderQuiz() {
            const q = currentQuestion();
            if (!q) return "";

            const idx = state.quiz.index + 1;
            const total = state.quiz.questions.length;
            const progress = Math.round((idx / total) * 100);

            const choicesHtml = q.type === "mcq"
                ? q.options.map((opt, i) => `
                    <button type="button" onclick="submitMcq(${i})" class="option-btn w-full border border-slate-300 bg-white rounded-xl px-4 py-3 text-left text-sm font-semibold text-slate-800 hover:border-blue-400 hover:bg-blue-50 transition safe-wrap">
                        ${esc(opt)}
                    </button>
                `).join("")
                : `
                    <div class="space-y-2">
                        <input id="short-answer" type="text" autocomplete="off" placeholder="${esc(q.placeholder || "정답 입력")}" onkeydown="if(event.key==='Enter'){submitShort();}" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
                        <button type="button" onclick="submitShort()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700">입력 완료</button>
                    </div>
                `;

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <div class="flex items-center justify-between text-xs">
                            <span class="font-bold text-blue-600">${idx} / ${total}</span>
                            <span class="text-slate-500">${q.grammar}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-xs font-bold text-slate-500">문제</p>
                        <p class="text-base font-bold text-slate-800 mt-2 leading-relaxed safe-wrap">${esc(q.prompt)}</p>
                        <div class="mt-4 space-y-2">${choicesHtml}</div>
                        <p class="text-[11px] text-slate-500 mt-3">객관식은 탭 즉시 제출됩니다. (버튼 입력 최소화)</p>
                    </div>
                </section>
            `;
        }

        function renderResult() {
            const attempt = resultById(state.selectedRecordId);
            if (!attempt) {
                return `
                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <p class="text-sm text-slate-700">기록을 찾을 수 없습니다.</p>
                        <button onclick="goStart()" class="mt-3 w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm">시작 화면으로</button>
                    </section>
                `;
            }

            const answerCards = attempt.answers.map((a, index) => {
                if (a.isCorrect) {
                    return `
                        <article class="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
                            <p class="text-xs text-emerald-700 font-bold">${index + 1}. ${esc(a.grammar)} · 정답</p>
                            <p class="text-sm text-slate-800 mt-1 safe-wrap">${esc(a.prompt)}</p>
                            <p class="text-xs text-emerald-700 mt-2">${esc(a.correctFeedback || "정답입니다.")}</p>
                        </article>
                    `;
                }

                return `
                    <article class="bg-rose-50 border border-rose-200 rounded-xl p-3">
                        <p class="text-xs text-rose-700 font-bold">${index + 1}. ${esc(a.grammar)} · 오답</p>
                        <p class="text-sm text-slate-800 mt-1 safe-wrap">${esc(a.prompt)}</p>
                        <p class="text-xs text-slate-700 mt-2"><b>내 답:</b> ${esc(a.userAnswer || "(무응답)")}</p>
                        <p class="text-xs text-slate-700 mt-1"><b>정답:</b> ${esc(a.correctAnswer)}</p>
                        <p class="text-xs text-rose-700 mt-2 safe-wrap"><b>왜 틀렸나요:</b> ${esc(a.wrongFeedback)}</p>
                        <p class="text-xs text-slate-700 mt-1 safe-wrap"><b>핵심 규칙:</b> ${esc(a.ruleHint)}</p>
                    </article>
                `;
            }).join("");

            return `
                <section class="space-y-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                        <p class="text-xs text-slate-500">응시 시각: ${formatDate(attempt.completedAt)}</p>
                        <h1 class="text-2xl font-black text-slate-800 mt-1">${attempt.score} / ${attempt.total}</h1>
                        <p class="text-sm text-slate-600 mt-1">정답률 ${attempt.percent}% · 소요 ${attempt.durationSec}초</p>
                        <div class="grid gap-2 mt-4">
                            <button onclick="restartFromResult()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm">다시 풀기</button>
                            <button onclick="goStart()" class="w-full border border-slate-300 text-slate-700 py-2.5 rounded-xl font-bold text-sm">시작 화면</button>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-slate-800 mb-3">정오답 피드백</h2>
                        <div class="space-y-2">${answerCards}</div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById("app");
            if (state.view === "start") {
                app.innerHTML = renderStart();
            } else if (state.view === "quiz") {
                app.innerHTML = renderQuiz();
            } else {
                app.innerHTML = renderResult();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            render();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
