<head>

</head>
<body class="bg-slate-50 min-h-screen flex flex-col max-w-md mx-auto shadow-xl">
    <nav class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>
    </nav>

    <header class="bg-white px-5 py-4 border-b border-slate-200 sticky top-[60px] z-20">
        <div class="flex justify-between items-start gap-3">
            <div>
                <p class="text-xs text-violet-600 font-bold uppercase tracking-wide">Grammar Upgrade</p>
                <h1 class="text-lg font-extrabold text-slate-900 mt-0.5">V-(으)려면 멀었다</h1>
                <p class="text-xs text-slate-500 mt-1">6과: 목표 달성까지 아직 멂 표현하기</p>
            </div>
            <button id="translation-btn" type="button" class="flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200">
                <i data-lucide="languages" class="w-3 h-3 mr-1"></i>
                <span id="translation-text">Tiếng Việt OFF</span>
            </button>
        </div>
    </header>

    <div class="flex border-b border-slate-200 bg-white sticky top-[139px] z-10">
        <button id="tab-learn" type="button" onclick="setTab('learn')" class="flex-1 py-3 text-sm font-semibold text-violet-600 border-b-2 border-violet-600 bg-violet-50">공부해요</button>
        <button id="tab-practice" type="button" onclick="setTab('practice')" class="flex-1 py-3 text-sm font-semibold text-slate-500">연습해요</button>
    </div>

    <main id="app-content" class="flex-1 p-4 pb-14"></main>

    <script>
        const lessonData = {
            title: "V-(으)려면 멀었다",
            meaningKo: "어떤 목표를 이루기에는 아직 시간이나 조건이 많이 부족하다는 뜻이에요.",
            meaningVi: "Dùng để nói rằng còn thiếu nhiều thời gian/điều kiện nên còn xa mới đạt được mục tiêu.",
            goalsKo: [
                "'-려면 멀었다'의 의미를 '아직 조건 부족'으로 이해할 수 있어요.",
                "받침 규칙(려면/으려면)을 정확히 적용할 수 있어요.",
                "'-면 되다', '-려고 하다'와 기능 차이를 구별할 수 있어요."
            ],
            goalsVi: [
                "Hiểu '-려면 멀었다' là còn thiếu điều kiện để đạt mục tiêu.",
                "Áp dụng đúng quy tắc '려면/으려면'.",
                "Phân biệt chức năng với '-면 되다' và '-려고 하다'."
            ]
        };

        const questionBank = [
            {
                id: "g4_q1",
                type: "mcq",
                prompt: "가: 숙제를 다 끝냈어요?\n나: 아니요, 다 (끝내다) ____.",
                promptVi: "A: Làm xong hết bài tập chưa?\nB: Chưa, còn lâu mới xong hết.",
                options: ["끝내려면 멀었어요", "끝내으려면 멀었어요", "끝냈으면 멀었어요"],
                answer: "끝내려면 멀었어요",
                explanationKo: "모음으로 끝난 어간 뒤에는 '려면'을 써서 '끝내려면'이 맞아요.",
                explanationVi: "Sau gốc kết thúc bằng nguyên âm, dùng '려면' -> '끝내려면'."
            },
            {
                id: "g4_q2",
                type: "mcq",
                prompt: "가: 한국어로 발표를 완벽하게 할 수 있어요?\n나: 아니요, ____.",
                promptVi: "A: Bạn có thể thuyết trình tiếng Hàn thật hoàn hảo không?\nB: Không, còn xa lắm.",
                options: ["하려면 멀었어요", "할 계획이에요", "하고 싶어요"],
                answer: "하려면 멀었어요",
                explanationKo: "능력이 아직 부족함을 말하는 문맥이라 '-려면 멀었어요'가 맞아요.",
                explanationVi: "Vì muốn nói năng lực còn thiếu, dùng '-려면 멀었어요'."
            },
            {
                id: "g4_q3",
                type: "mcq",
                prompt: "받침 있는 동사 뒤 형태로 맞는 것은?",
                promptVi: "Dạng nào đúng sau động từ có 받침?",
                options: ["먹으려면 멀었어요", "먹려면 멀었어요", "먹을려면 멀었어요"],
                answer: "먹으려면 멀었어요",
                explanationKo: "받침이 있으면 '으려면'을 붙여 '먹으려면'이 돼요.",
                explanationVi: "Nếu có 받침, gắn '으려면' -> '먹으려면'."
            },
            {
                id: "g4_q4",
                type: "mcq",
                prompt: "이미 조건이 충분해서 '지금 제출하면 합격 가능'이라는 뜻이면?",
                promptVi: "Nếu điều kiện đã đủ và nghĩa là 'nộp ngay bây giờ thì đậu được' thì chọn gì?",
                options: ["합격하려면 멀었어요", "합격하면 돼요", "합격하려고 해요"],
                answer: "합격하면 돼요",
                explanationKo: "조건이 충분한 상황은 '-면 되다'가 맞고, '-려면 멀었다'와 반대 의미예요.",
                explanationVi: "Khi điều kiện đã đủ, dùng '-면 되다'; trái nghĩa với '-려면 멀었다'."
            },
            {
                id: "g4_q5",
                type: "fill",
                prompt: "원어민처럼 말(하다) ____ 아직 멀었어요.",
                promptVi: "Để nói như người bản ngữ thì tôi vẫn còn xa.",
                answers: ["하려면"],
                hint: "하다 -> 하려면",
                explanationKo: "'하다'는 축약되어 '하려면'이 돼요.",
                explanationVi: "'하다' rút gọn thành '하려면'."
            },
            {
                id: "g4_q6",
                type: "fill",
                prompt: "돈을 충분히 ____ 아직 멀었어요. (벌다)",
                promptVi: "Tôi còn xa mới kiếm đủ tiền.",
                answers: ["벌려면"],
                hint: "ㄹ 받침: 벌다 -> 벌려면",
                explanationKo: "'벌다'는 ㄹ 받침이라 '으' 없이 '벌려면'이 맞아요.",
                explanationVi: "'벌다' có 받침 ㄹ nên không thêm '으', đúng là '벌려면'."
            },
            {
                id: "g4_q7",
                type: "fill",
                prompt: "집을 ____ 아직 멀었어요. (사다)",
                promptVi: "Để mua nhà thì còn xa lắm.",
                answers: ["사려면"],
                hint: "사다 -> 사려면",
                explanationKo: "받침 없는 동사 '사다' 뒤에는 '려면'을 붙여요.",
                explanationVi: "Với động từ không 받침 như '사다', gắn '려면'."
            },
            {
                id: "g4_q8",
                type: "mcq",
                prompt: "상황: 이제 막 레슨을 시작했어요. 가장 알맞은 말은?",
                promptVi: "Tình huống: Mới bắt đầu học đàn. Câu phù hợp nhất là?",
                contextKo: "목표: 피아노를 프로처럼 연주하기",
                contextVi: "Mục tiêu: chơi piano như chuyên nghiệp.",
                options: ["치려면 멀었어요", "치면 돼요", "칠 예정이에요"],
                answer: "치려면 멀었어요",
                explanationKo: "시작 단계라 목표 달성까지 멀다는 뜻의 '-려면 멀었어요'가 자연스러워요.",
                explanationVi: "Vì mới bắt đầu nên dùng '-려면 멀었어요' để nói còn xa mới đạt mục tiêu."
            }
        ];

        const KEY = "c10.grammar4.upgraded.v1";

        function loadPref() {
            try {
                return JSON.parse(localStorage.getItem(KEY) || "{}");
            } catch (e) {
                return {};
            }
        }

        function savePref(data) {
            try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {}
        }

        function shuffle(arr) {
            const copied = [...arr];
            for (let i = copied.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copied[i], copied[j]] = [copied[j], copied[i]];
            }
            return copied;
        }

        function cloneQuestions(pool) {
            return shuffle(pool).map((q) => ({
                ...q,
                options: q.options ? [...q.options] : undefined,
                answers: q.answers ? [...q.answers] : undefined
            }));
        }

        function createQuiz(pool, modeLabel = "전체 문제") {
            return {
                modeLabel,
                questions: cloneQuestions(pool),
                index: 0,
                score: 0,
                selected: "",
                showResult: false,
                showHint: false,
                finished: false,
                mistakes: []
            };
        }

        const pref = loadPref();
        const state = {
            activeTab: "learn",
            showVi: Boolean(pref.showVi),
            best: pref.best || { score: 0, total: questionBank.length, percent: 0 },
            quiz: createQuiz(questionBank)
        };

        function viClass() { return state.showVi ? "block" : "hidden"; }
        function norm(v) { return String(v || "").replace(/\s+/g, "").trim(); }
        function currentQ() { return state.quiz.questions[state.quiz.index]; }
        function setTab(tab) { state.activeTab = tab; render(); }

        function toggleTranslation() {
            state.showVi = !state.showVi;
            savePref({ showVi: state.showVi, best: state.best });
            render();
        }

        function chooseOption(option) {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "mcq" || quiz.showResult || quiz.finished) return;

            quiz.selected = option;
            quiz.showResult = true;
            if (option === q.answer) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: option });
            }
            render();
        }

        function submitFill() {
            const quiz = state.quiz;
            const q = currentQ();
            if (!q || q.type !== "fill" || quiz.showResult || quiz.finished) return;

            const input = document.getElementById("fill-input");
            const value = input ? input.value : "";
            if (!norm(value)) return;

            quiz.selected = value;
            quiz.showResult = true;
            const ok = q.answers.some((a) => norm(a) === norm(value));
            if (ok) {
                quiz.score += 1;
            } else {
                quiz.mistakes.push({ question: q, userAnswer: value });
            }
            render();
        }

        function toggleHint() {
            if (state.quiz.showResult || state.quiz.finished) return;
            state.quiz.showHint = !state.quiz.showHint;
            render();
        }

        function nextQuestion() {
            const quiz = state.quiz;
            if (!quiz.showResult) return;

            quiz.selected = "";
            quiz.showResult = false;
            quiz.showHint = false;

            if (quiz.index < quiz.questions.length - 1) {
                quiz.index += 1;
            } else {
                quiz.finished = true;
                updateBest();
            }
            render();
        }

        function updateBest() {
            const quiz = state.quiz;
            const percent = Math.round((quiz.score / quiz.questions.length) * 100);
            if (
                percent > state.best.percent ||
                (percent === state.best.percent && quiz.questions.length >= state.best.total && quiz.score > state.best.score)
            ) {
                state.best = { score: quiz.score, total: quiz.questions.length, percent };
                savePref({ showVi: state.showVi, best: state.best });
            }
        }

        function restartQuiz() {
            state.quiz = createQuiz(questionBank);
            render();
        }

        function retryWrong() {
            const unique = [];
            const seen = new Set();
            state.quiz.mistakes.forEach((m) => {
                if (!seen.has(m.question.id)) {
                    seen.add(m.question.id);
                    unique.push(m.question);
                }
            });
            if (!unique.length) return;
            state.quiz = createQuiz(unique, "오답 다시 풀기");
            render();
        }

        function badgeFor(percent) {
            if (percent >= 90) return { label: "완전 이해", cls: "bg-violet-100 text-violet-700" };
            if (percent >= 75) return { label: "좋아요", cls: "bg-blue-100 text-blue-700" };
            if (percent >= 60) return { label: "조금 더 연습", cls: "bg-amber-100 text-amber-700" };
            return { label: "핵심 복습 필요", cls: "bg-rose-100 text-rose-700" };
        }

        function renderLearn() {
            const vi = viClass();
            return `
                <div class="space-y-4">
                    <section class="bg-gradient-to-br from-violet-50 to-white border border-violet-100 rounded-2xl p-5 shadow-sm">
                        <h2 class="text-2xl font-black text-violet-700">${lessonData.title}</h2>
                        <p class="text-sm font-semibold text-slate-700 mt-1">${lessonData.meaningKo}</p>
                        <p class="text-xs text-violet-600 mt-1 ${vi}">${lessonData.meaningVi}</p>

                        <div class="mt-4 bg-white border border-violet-100 rounded-xl p-3">
                            <p class="text-xs font-bold text-slate-500">학습 전략 (효과 강화)</p>
                            <ol class="mt-2 text-sm text-slate-700 list-decimal pl-5 space-y-1">
                                <li>먼저 '아직 멀다'라는 핵심 의미를 문맥에서 확인하기</li>
                                <li>려면/으려면 형태를 받침 규칙으로 정확히 만들기</li>
                                <li>유사 표현과 구별해 오답 원인을 빠르게 수정하기</li>
                            </ol>
                            <ul class="mt-2 text-xs text-violet-600 list-disc pl-5 space-y-1 ${vi}">
                                ${lessonData.goalsVi.map((g) => `<li>${g}</li>`).join("")}
                            </ul>
                        </div>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-slate-800 flex items-center">
                            <i data-lucide="git-compare" class="w-4 h-4 mr-2 text-violet-600"></i>
                            헷갈림 비교
                        </h3>
                        <div class="mt-3 overflow-x-auto">
                            <table class="w-full text-sm border-collapse">
                                <thead>
                                    <tr class="bg-slate-100">
                                        <th class="text-left p-2 border border-slate-200">표현</th>
                                        <th class="text-left p-2 border border-slate-200">핵심 기능</th>
                                        <th class="text-left p-2 border border-slate-200">예문</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-violet-700">-(으)려면 멀었다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>목표 달성까지 조건/시간이 부족함</p>
                                            <p class="text-[11px] leading-4 text-violet-600 mt-1 break-words ${vi}">Còn thiếu điều kiện/thời gian nên còn xa mới đạt mục tiêu</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">원어민처럼 말하려면 멀었어요.</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-emerald-700">-(으)면 되다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>조건 충족 시 가능/충분함</p>
                                            <p class="text-[11px] leading-4 text-violet-600 mt-1 break-words ${vi}">Chỉ cần đáp ứng điều kiện là được</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">서류만 제출하면 돼요.</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border border-slate-200 font-bold text-blue-700">-(으)려고 하다</td>
                                        <td class="p-2 border border-slate-200">
                                            <p>지금 의도/직전 시도</p>
                                            <p class="text-[11px] leading-4 text-violet-600 mt-1 break-words ${vi}">Ý định ngay lúc nói hoặc hành động sắp thực hiện</p>
                                        </td>
                                        <td class="p-2 border border-slate-200">지금 나가려고 해요.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-xs text-rose-600 mt-2">주의: '-(으)려면 멀었다'는 목표 기준이 높아 아직 부족함을 강조해요.</p>
                        <p class="text-xs text-violet-600 mt-1 ${vi}">Lưu ý: Mẫu này nhấn mạnh rằng trình độ hiện tại còn chưa đủ so với mục tiêu.</p>
                    </section>

                    <section class="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                        <h3 class="font-bold text-amber-900 flex items-center">
                            <i data-lucide="brain" class="w-4 h-4 mr-2"></i>
                            미니 인출 연습
                        </h3>
                        <p class="text-xs text-amber-700 mt-1">정답을 먼저 머릿속에서 말한 후 펼쳐보세요.</p>
                        <div class="mt-3 space-y-2">
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"한국어로 통역____ 아직 멀었어요" (하다)</summary>
                                <p class="text-sm mt-2">정답: <b>하려면</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"돈을 충분히 ____ 집을 사려면 멀었어요" (벌다)</summary>
                                <p class="text-sm mt-2">정답: <b>벌려면</b></p>
                            </details>
                            <details class="bg-white border border-amber-200 rounded-lg p-3">
                                <summary class="text-sm cursor-pointer font-semibold">"지금 제출하면 합격 가능"일 때는?</summary>
                                <p class="text-sm mt-2">정답: <b>합격하면 돼요</b> (비교 표현)</p>
                            </details>
                        </div>
                    </section>
                </div>
            `;
        }

        function renderPractice() {
            const quiz = state.quiz;
            const vi = viClass();

            if (quiz.finished) {
                const percent = Math.round((quiz.score / quiz.questions.length) * 100);
                const badge = badgeFor(percent);
                const mistakes = quiz.mistakes.length
                    ? quiz.mistakes.map((m, i) => `
                        <li class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs">
                            <p class="font-semibold">${i + 1}. ${m.question.prompt}</p>
                            <p class="mt-1">내 답: <b>${m.userAnswer}</b></p>
                            <p>정답: <b>${m.question.type === 'mcq' ? m.question.answer : m.question.answers[0]}</b></p>
                            <p class="mt-1">${m.question.explanationKo}</p>
                            <p class="text-violet-600 mt-1 ${vi}">${m.question.explanationVi}</p>
                        </li>
                    `).join("")
                    : `<li class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-xs text-emerald-700">오답이 없습니다. 훌륭해요!</li>`;

                return `
                    <div class="space-y-4">
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center">
                            <div class="w-16 h-16 rounded-full bg-violet-100 mx-auto flex items-center justify-center text-violet-600">
                                <i data-lucide="trophy" class="w-8 h-8"></i>
                            </div>
                            <h2 class="text-xl font-black text-slate-800 mt-3">${quiz.score} / ${quiz.questions.length}</h2>
                            <p class="text-sm text-slate-600 mt-1">정답률 ${percent}%</p>
                            <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs font-bold ${badge.cls}">${badge.label}</span>
                            <p class="text-xs text-slate-500 mt-2">최고 기록: ${state.best.score}/${state.best.total} (${state.best.percent}%)</p>
                            <p class="text-xs text-violet-600 mt-1 ${vi}">Best score: ${state.best.percent}%</p>
                            <div class="grid gap-2 mt-4">
                                <button onclick="restartQuiz()" class="w-full bg-violet-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-violet-700">처음부터 다시</button>
                                <button onclick="retryWrong()" ${quiz.mistakes.length ? "" : "disabled"} class="w-full border border-slate-300 rounded-lg py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100 disabled:opacity-50">오답만 다시 풀기</button>
                            </div>
                        </section>
                        <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                            <h3 class="font-bold text-slate-800 mb-3">오답 노트</h3>
                            <ul class="space-y-2">${mistakes}</ul>
                        </section>
                    </div>
                `;
            }

            const q = currentQ();
            const progress = Math.round(((quiz.showResult ? quiz.index + 1 : quiz.index) / quiz.questions.length) * 100);
            const isCorrect = q.type === "mcq"
                ? quiz.selected === q.answer
                : q.answers.some((a) => norm(a) === norm(quiz.selected));

            const options = q.type === "mcq"
                ? q.options.map((opt) => {
                    let style = "border-slate-200 hover:border-violet-300 hover:bg-violet-50";
                    let icon = "";
                    if (quiz.showResult) {
                        if (opt === q.answer) {
                            style = "border-emerald-500 bg-emerald-50 text-emerald-700";
                            icon = "<i data-lucide='check' class='w-4 h-4 text-emerald-600'></i>";
                        } else if (opt === quiz.selected) {
                            style = "border-rose-400 bg-rose-50 text-rose-700";
                            icon = "<i data-lucide='x' class='w-4 h-4 text-rose-600'></i>";
                        } else {
                            style = "border-slate-200 text-slate-400";
                        }
                    }
                    return `<button onclick="chooseOption('${opt}')" ${quiz.showResult ? "disabled" : ""} class="w-full border-2 rounded-lg px-4 py-3 text-left font-semibold mb-2 flex justify-between items-center ${style}"><span>${opt}</span>${icon}</button>`;
                }).join("")
                : `
                    <label for="fill-input" class="text-xs font-semibold text-slate-500">정답 입력</label>
                    <input id="fill-input" type="text" autocomplete="off" ${quiz.showResult ? "disabled" : ""} class="w-full mt-1 border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="예: 하려면" onkeydown="if(event.key==='Enter'){submitFill();}">
                    <div class="flex gap-2 mt-3">
                        <button onclick="submitFill()" ${quiz.showResult ? "disabled" : ""} class="flex-1 bg-violet-600 text-white rounded-lg py-2.5 text-sm font-semibold">정답 확인</button>
                        <button onclick="toggleHint()" ${quiz.showResult ? "disabled" : ""} class="px-3 border border-slate-300 rounded-lg text-sm font-semibold text-slate-600">힌트</button>
                    </div>
                    <p class="text-xs text-amber-700 mt-2 ${quiz.showHint ? "block" : "hidden"}">힌트: ${q.hint || "-"}</p>
                `;

            const feedback = quiz.showResult ? `
                <div class="mt-4 rounded-xl border p-4 ${isCorrect ? "bg-emerald-50 border-emerald-200" : "bg-rose-50 border-rose-200"}">
                    <p class="text-sm font-bold ${isCorrect ? "text-emerald-700" : "text-rose-700"}">${isCorrect ? "정답입니다!" : "오답입니다. 근거를 확인하세요."}</p>
                    <p class="text-xs text-slate-600 mt-2">내 답: <b>${quiz.selected}</b></p>
                    <p class="text-xs text-slate-700 mt-1">정답: <b>${q.type === "mcq" ? q.answer : q.answers[0]}</b></p>
                    <p class="text-sm text-slate-700 mt-3">${q.explanationKo}</p>
                    <p class="text-xs text-violet-600 mt-1 ${vi}">${q.explanationVi}</p>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-violet-600 text-white rounded-lg py-2.5 text-sm font-semibold">다음 문제</button>
                </div>
            ` : "";

            return `
                <div class="space-y-4">
                    <section class="bg-violet-50 border border-violet-100 rounded-2xl p-4 shadow-sm">
                        <h2 class="text-sm font-bold text-violet-700">전략 기반 연습</h2>
                        <p class="text-xs text-slate-600 mt-1">목표와 현재 수준의 간격을 판단하고, 형태(려면/으려면)를 정확히 고정합니다.</p>
                    </section>

                    <section class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-violet-600">${quiz.modeLabel}</span>
                            <span class="text-xs text-slate-500">문제 ${quiz.index + 1}/${quiz.questions.length}</span>
                        </div>
                        <div class="mt-2 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-violet-500" style="width: ${progress}%;"></div></div>
                        <p class="text-xs text-slate-500 mt-1">점수 ${quiz.score}점</p>

                        <div class="mt-4 bg-slate-50 border border-slate-200 rounded-xl p-4">
                            <p class="text-sm font-semibold text-slate-800">${q.prompt}</p>
                            <p class="text-[11px] text-slate-500 mt-2 ${q.contextKo ? "block" : "hidden"}">${q.contextKo || ""}</p>
                            <p class="text-xs text-violet-600 mt-1 ${vi}">${q.promptVi || ""}</p>
                            <p class="text-[11px] text-violet-600 mt-1 ${q.contextVi ? vi : "hidden"}">${q.contextVi || ""}</p>
                        </div>

                        <div class="mt-4">${options}</div>
                        ${feedback}
                    </section>
                </div>
            `;
        }

        function render() {
            const content = document.getElementById("app-content");
            const tabLearn = document.getElementById("tab-learn");
            const tabPractice = document.getElementById("tab-practice");
            const transBtn = document.getElementById("translation-btn");
            const transText = document.getElementById("translation-text");

            if (state.activeTab === "learn") {
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-violet-600 border-b-2 border-violet-600 bg-violet-50";
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderLearn();
            } else {
                tabPractice.className = "flex-1 py-3 text-sm font-semibold text-violet-600 border-b-2 border-violet-600 bg-violet-50";
                tabLearn.className = "flex-1 py-3 text-sm font-semibold text-slate-500";
                content.innerHTML = renderPractice();
            }

            if (state.showVi) {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-violet-100 text-violet-700 border border-violet-200";
                transText.textContent = "Tiếng Việt ON";
            } else {
                transBtn.className = "flex items-center px-3 py-1.5 rounded-full text-xs font-semibold transition-all bg-slate-100 text-slate-600 border border-slate-200";
                transText.textContent = "Tiếng Việt OFF";
            }

            lucide.createIcons();

            if (state.activeTab === "practice") {
                const q = currentQ();
                if (q && q.type === "fill" && !state.quiz.showResult) {
                    const input = document.getElementById("fill-input");
                    if (input) input.focus();
                }
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("translation-btn").addEventListener("click", toggleTranslation);
            render();
        });
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
