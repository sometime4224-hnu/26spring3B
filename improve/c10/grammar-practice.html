            bestSummary: document.getElementById("best-summary"),
            retryBtn: document.getElementById("retry-btn"),
            wrongOnlyBtn: document.getElementById("wrong-only-btn")
        };

        function shuffle(list) {
            const arr = [...list];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function normalizeSet(setName) {
            const allowed = new Set(["all", "g1", "g2", "g3", "g4"]);
            return allowed.has(setName) ? setName : "all";
        }

        function getSetLabel(setName) {
            return UI.labels[setName] || UI.labels.all;
        }

        function getQuestionsForSet(setName) {
            if (setName === "all") return QUESTIONS;
            return QUESTIONS.filter((q) => q.set === setName);
        }

        function updateBestScore() {
            const key = `korean3b.grammar-quiz.best.${state.set}`;
            const best = Number(localStorage.getItem(key) || "0");
            const current = state.questions.length === 0 ? 0 : Math.round((state.score / state.questions.length) * 100);
            const nextBest = Math.max(best, current);
            localStorage.setItem(key, String(nextBest));
            return { best: nextBest, current };
        }

        function startQuiz(setName, customQuestions) {
            state.set = normalizeSet(setName);
            const pool = customQuestions && customQuestions.length > 0 ? customQuestions : getQuestionsForSet(state.set);
            state.questions = shuffle(pool);
            state.index = 0;
            state.score = 0;
            state.answered = false;
            state.wrongIds = [];

            el.resultCard.classList.add("hidden");
            el.quizCard.classList.remove("hidden");
            renderSetButtons();
            renderQuestion();
        }

        function renderSetButtons() {
            el.setButtons.innerHTML = "";
            ["all", "g1", "g2", "g3", "g4"].forEach((setName) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "set-btn px-3 py-2 rounded-lg border border-slate-600 text-slate-200 text-sm font-semibold hover:border-blue-500";
                if (state.set === setName) btn.classList.add("active");
                btn.textContent = getSetLabel(setName);
                btn.addEventListener("click", () => startQuiz(setName));
                el.setButtons.appendChild(btn);
            });
        }

        function renderQuestion() {
            const total = state.questions.length;
            if (total === 0) {
                el.questionSet.textContent = "";
                el.questionText.textContent = "\uBB38\uC81C\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.";
                el.choices.innerHTML = "";
                return;
            }

            const q = state.questions[state.index];
            el.progressText.textContent = `\uBB38\uC81C ${state.index + 1} / ${total}`;
            el.scoreText.textContent = `\uD604\uC7AC \uC810\uC218: ${state.score}`;
            el.questionSet.textContent = getSetLabel(q.set);
            el.questionText.textContent = q.prompt;
            el.feedback.classList.add("hidden");
            el.feedback.innerHTML = "";
            el.nextBtn.classList.add("hidden");
            state.answered = false;

            el.choices.innerHTML = "";
            q.choices.forEach((choice, index) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "choice-btn text-left w-full px-4 py-3 rounded-xl border border-slate-600 bg-slate-900/60 hover:border-blue-500";
                btn.textContent = choice;
                btn.addEventListener("click", () => handleChoice(index));
                el.choices.appendChild(btn);
            });
        }

        function handleChoice(choiceIndex) {
            if (state.answered) return;
            state.answered = true;

            const q = state.questions[state.index];
            const choiceButtons = Array.from(el.choices.querySelectorAll("button"));
            const isCorrect = choiceIndex === q.answer;

            choiceButtons.forEach((btn, idx) => {
                if (idx === q.answer) btn.classList.add("correct");
                if (idx === choiceIndex && !isCorrect) btn.classList.add("wrong");
                btn.disabled = true;
            });

            if (isCorrect) {
                state.score += 1;
            } else {
                state.wrongIds.push(q.id);
            }

            el.feedback.classList.remove("hidden");
            el.feedback.className = "rounded-xl border p-4 text-sm " + (isCorrect
                ? "border-green-500 bg-green-900/30 text-green-200"
                : "border-red-500 bg-red-900/30 text-red-200");
            el.feedback.innerHTML = `<strong>${isCorrect ? "\uC815\uB2F5" : "\uC624\uB2F5"}</strong><br>${q.explain}`;
            el.nextBtn.classList.remove("hidden");
            el.scoreText.textContent = `\uD604\uC7AC \uC810\uC218: ${state.score}`;
        }

        function nextQuestion() {
            if (!state.answered) return;
            if (state.index < state.questions.length - 1) {
                state.index += 1;
                renderQuestion();
                return;
            }
            showResult();
        }

        function showResult() {
            el.quizCard.classList.add("hidden");
            el.resultCard.classList.remove("hidden");

            const total = state.questions.length;
            const { best, current } = updateBestScore();
            const wrongCount = total - state.score;

            el.resultTitle.textContent = "\uC644\uB8CC! \uACB0\uACFC\uB97C \uD655\uC778\uD558\uC138\uC694.";
            el.resultSummary.textContent = `\uCD1D ${total}\uBB38\uC81C \uC911 ${state.score}\uBB38\uC81C \uC815\uB2F5 (${current}%) | \uC624\uB2F5 ${wrongCount}\uBB38\uC81C`;
            el.bestSummary.textContent = `\uCD5C\uACE0 \uAE30\uB85D (${getSetLabel(state.set)}): ${best}%`;

            el.wrongOnlyBtn.disabled = state.wrongIds.length === 0;
            if (el.wrongOnlyBtn.disabled) {
                el.wrongOnlyBtn.classList.add("opacity-50", "cursor-not-allowed");
            } else {
                el.wrongOnlyBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        function retryWrongOnly() {
            const wrongSet = QUESTIONS.filter((q) => state.wrongIds.includes(q.id));
            if (wrongSet.length === 0) return;
            startQuiz(state.set, wrongSet);
        }

        function init() {
            const setParam = new URLSearchParams(window.location.search).get("set") || "all";
            startQuiz(normalizeSet(setParam));
            el.nextBtn.addEventListener("click", nextQuestion);
            el.retryBtn.addEventListener("click", () => startQuiz(state.set));
            el.wrongOnlyBtn.addEventListener("click", retryWrongOnly);
        }

        init();
    </script>
    <script src="../shared/learning-enhancements.js"></script>
</body>
</html>
