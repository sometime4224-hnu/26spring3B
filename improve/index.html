        <script>
        (function () {
            const T = {
                title: "\uD55C\uAD6D\uC5B4 3B\uBC18 \uD559\uC2B5 \uC790\uB8CC",
                heading: "\uD55C\uAD6D\uC5B4 3B\uBC18 \uD559\uC2B5 \uC790\uB8CC",
                subtitle: "\uD559\uC2B5\uD560 \uB2E8\uC6D0\uC744 \uC120\uD0DD\uD574 \uBC14\uB85C \uC2DC\uC791\uD558\uC138\uC694.",
                unit: "\uB2E8\uC6D0",
                coming: "\uC900\uBE44 \uC911",
                notReady: "\uC544\uC9C1 \uC900\uBE44 \uC911\uC785\uB2C8\uB2E4."
            };

            document.addEventListener('DOMContentLoaded', function () {
                document.title = T.title;

                const h1 = document.querySelector('header h1');
                if (h1) h1.textContent = T.heading;

                const subtitle = document.querySelector('header p');
                if (subtitle) subtitle.textContent = T.subtitle;

                document.querySelectorAll('.activity-button span:first-child').forEach((el) => {
                    el.textContent = T.unit;
                });

                const buttons = document.querySelectorAll('.activity-button');

                function disableButton(button, reasonText) {
                    if (button.classList.contains('disabled')) return;
                    button.classList.add('disabled');
                    button.setAttribute('title', reasonText);

                    const badge = document.createElement('div');
                    badge.className = "absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] rounded-2xl flex items-center justify-center";
                    badge.innerHTML = `<span class="px-3 py-1 bg-slate-800 text-slate-300 text-[10px] font-bold tracking-wider rounded-full border border-slate-700">${T.coming}</span>`;
                    button.style.position = 'relative';
                    button.appendChild(badge);
                }

                if (window.location.protocol === 'file:') {
                    const availableChapters = new Set(['c10','c11']);
                    buttons.forEach(button => {
                        const href = button.getAttribute('href') || '';
                        const match = href.match(/^(c\d+)\/index\.html$/i);
                        if (!match) return;
                        if (!availableChapters.has(match[1].toLowerCase())) {
                            disableButton(button, T.notReady);
                        }
                    });
                    return;
                }

                buttons.forEach(button => {
                    const fileUrl = button.getAttribute('href');
                    fetch(fileUrl, { method: 'HEAD' })
                        .then(response => {
                            if (!response.ok) {
                                disableButton(button, T.notReady);
                            }
                        })
                        .catch(() => {
                            // Keep button enabled on transient errors.
                        });
                });
            });
        })();
    </script>
