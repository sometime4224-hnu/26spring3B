<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한국어 추측 표현 뉘앙스 퀴즈 (15문항)</title>
  <style>
    :root {
      --bg: #111827;
      --card-bg: #1f2937;
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --accent: #60a5fa;
      --success: #34d399;
      --error: #f87171;
      --border: #374151;
      --radius: 16px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%; max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* 반응형 레이아웃 */
    @media (max-width: 850px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }

    /* 카드 공통 스타일 */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: border-color 0.3s ease;
    }

    /* 메인 퀴즈 영역 */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      background: #374151;
      color: var(--accent);
    }

    .context-box {
      background: #111827;
      border-left: 4px solid var(--accent);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .context-label {
      display: block;
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .blank {
      display: inline-block;
      min-width: 60px;
      text-align: center;
      border-bottom: 2px dashed var(--text-sub);
      color: var(--accent);
      font-weight: bold;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-choice {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 16px;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-choice:hover:not(:disabled) {
      border-color: var(--accent);
      background: #1e2532;
    }

    .btn-choice:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* 정오답 상태 스타일 */
    .btn-choice.correct {
      border-color: var(--success);
      background: rgba(52, 211, 153, 0.1);
      color: var(--success);
    }
    
    .btn-choice.wrong {
      border-color: var(--error);
      background: rgba(248, 113, 113, 0.1);
      color: var(--error);
    }

    /* 피드백 영역 */
    .feedback {
      margin-top: 24px;
      padding: 16px;
      background: #18202f;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
      border: 1px solid var(--border);
    }

    .feedback-title {
      font-weight: 800;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .txt-success { color: var(--success); }
    .txt-error { color: var(--error); }

    /* 사이드바 (점수 및 가이드) */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }
    
    .score-board {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    
    .big-score { font-size: 32px; font-weight: 800; line-height: 1; }
    .total-score { font-size: 14px; color: var(--text-sub); }

    .progress-track {
      height: 8px;
      background: #374151;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .guide-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 14px;
      color: var(--text-sub);
    }
    
    .guide-list li { margin-bottom: 12px; line-height: 1.5; }
    .guide-list strong { color: var(--text-main); }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .btn-ctl {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      font-weight: 600;
    }
    .btn-ctl:hover { background: #374151; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>

    <!-- Tailwind & Fonts Injected -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif !important; }
        .injected-global-nav {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e0e7ff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 999999;
            box-sizing: border-box;
            gap: 15px;
        }
        .injected-global-nav a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: color 0.2s;
        }
        .injected-global-nav a:hover {
            color: #3730a3;
        }
        .injected-global-nav .divider {
            color: #cbd5e1;
        }
        /* Ensure body has no top margin/padding resetting the nav */
        body { margin: 0; }
    </style>
        <link rel="stylesheet" href="../assets/content-consistency.css">
</head>
<body>
    <nav id="injected-global-nav" class="injected-global-nav">
        <a href="../index.html"><i class="fa-solid fa-house"></i> 메인으로</a>
        <span class="divider">|</span>
        <a href="index.html"><i class="fa-solid fa-folder-open"></i> 단원 홈</a>
    </nav>
    

<div class="container">
  <main class="card" id="quizCard">
    <div class="quiz-header">
      <h2 style="margin:0; font-size:20px;">추측 정확성 퀴즈</h2>
      <span class="badge" id="qNum">문제 1/15</span>
    </div>

    <div class="context-box">
      <span class="context-label">상황 (근거)</span>
      <div id="qContext" style="font-size: 16px;"></div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback" style="display:none;">
      <div class="feedback-title" id="resTitle"></div>
      <div style="font-size:14px; color:var(--text-sub); line-height:1.6;" id="explain"></div>
    </div>
  </main>

  <aside class="sidebar">
    <div class="card">
      <div class="score-board">
        <div>
          <div style="font-size:12px; color:var(--text-sub); margin-bottom:4px;">현재 점수</div>
          <div class="big-score" id="scoreText">0</div>
        </div>
        <div class="total-score" id="totalCount">/ 15 문제</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      
      <div class="controls">
        <button class="btn-ctl" id="prevBtn">이전</button>
        <button class="btn-ctl" id="nextBtn">다음</button>
      </div>
      <button class="btn-ctl" id="resetBtn" style="width:100%; margin-top:10px; border-color:var(--error); color:var(--error);">다시 시작</button>
    </div>

    <div class="card" style="font-size:14px;">
      <h3 style="margin:0 0 16px 0; font-size:16px;">💡 핵심 가이드</h3>
      <ul class="guide-list">
        <li>
          <strong>-(으)ㄹ 텐데요</strong> (확신 90%)<br>
          근거가 확실할 때 (관찰, 규칙, 데이터)
        </li>
        <li>
          <strong>-(으)ㄹ 것 같아요</strong> (확신 50~70%)<br>
          일반적인 생각이나 흐름상 추측
        </li>
        <li>
          <strong>-(으)ㄹ걸요</strong> (확신 30%)<br>
          근거가 없거나 막연한 느낌, 무확인
        </li>
      </ul>
    </div>
  </aside>
</div>

<script>
(() => {
  // 문항 데이터 (총 15개)
  const items = [
    // 기존 문항 (1~10)
    { id: 1, context: "하늘이 아주 어둡고 바람이 셉니다. 천둥 소리도 들려요.<br>→ <b>조금 있으면 비가 _____ .</b>", answer: "T", why: "천둥과 어두운 하늘은 비가 온다는 매우 강력한 객관적 근거입니다. (강한 확신)" },
    { id: 2, context: "친구가 민수의 위치를 묻는데, 나는 오늘 민수와 연락한 적이 없어요.<br>→ <b>잘 모르겠는데, 아마 집에 _____ .</b>", answer: "K", why: "연락이나 정보가 전혀 없는 상태에서의 막연한 추측입니다. (가장 약한 확신)" },
    { id: 3, context: "수업 시작 9시, 현재 8시 55분. 학교까지는 걸어서 20분 걸려요.<br>→ <b>지금 출발하면 늦을 _____ .</b>", answer: "T", why: "시간과 거리 계산(수치)에 따른 결과는 사실에 가깝습니다. (강한 근거)" },
    { id: 4, context: "일기예보에서 내일 비 올 확률이 50%라고 했습니다.<br>→ <b>내일 비가 올 _____ .</b>", answer: "G", why: "확률 50%는 확정적이지 않은 일반적인 가능성입니다. (중간 확신)" },
    { id: 5, context: "규정상 지각 3번은 경고입니다. 동료가 오늘로 3번째 지각을 했어요.<br>→ <b>오늘 경고를 받을 _____ .</b>", answer: "T", why: "규칙(규정)에 따른 결과는 예외 없이 적용되므로 확신이 매우 강합니다." },
    { id: 6, context: "내일 친구들과 놀러 가는데, 그냥 느낌이 쎄해요.<br>→ <b>내일 비가 올 _____ .</b>", answer: "K", why: "단순한 '느낌'은 객관적 근거가 될 수 없습니다. (약한 확신)" },
    { id: 7, context: "지하철이 멈췄습니다. 안내 방송은 아직 안 나왔어요.<br>→ <b>고장 난 것 _____ .</b>", answer: "G", why: "상황으로 보아 짐작(일반 추정)할 수 있지만, 확실한 증거는 아직 없습니다." },
    { id: 8, context: "친구가 약속 장소에 없어요. 내가 보낸 문자를 확인해보니 내가 장소를 잘못 적었어요.<br>→ <b>네가 장소를 잘못 알았을 _____ .</b> (X) <br>→ <b>내가 장소를 잘못 말했을 _____ .</b>", answer: "T", why: "문자 기록이라는 명백한 증거(Fact)가 있습니다." },
    { id: 9, context: "팀장님은 꼼꼼한 성격입니다. 하지만 보고서를 직접 확인하진 못했어요.<br>→ <b>팀장님이 이 보고서를 싫어할 _____ .</b>", answer: "G", why: "성격을 근거로 한 일반적인 예상이지만, 결과는 달라질 수 있습니다." },
    { id: 10, context: "가게 불이 꺼져 있고 '영업 종료' 팻말이 걸려 있습니다.<br>→ <b>이미 문을 닫았을 _____ .</b>", answer: "T", why: "눈앞의 시각적 증거(꺼진 불, 팻말)가 매우 확실합니다." },

    // 추가 문항 (11~15)
    { 
      id: 11, 
      context: "친구가 새로 산 커피를 가리키며 '이거 민수 씨가 좋아할까?'라고 묻습니다. 나는 민수 씨 식성을 전혀 몰라요.<br>→ <b>글쎄요, 아마 _____ .</b>", 
      answer: "K", 
      why: "상대방의 취향(정보)을 전혀 모르는 상태에서 대답하고 있습니다. 근거가 없으므로 가장 약한 추측인 '-을걸요'가 적절합니다." 
    },
    { 
      id: 12, 
      context: "금요일 저녁 7시 강남역입니다. 도로 상황을 보진 않았지만, 평소에 늘 차가 많은 시간이죠.<br>→ <b>지금 차를 가져가면 길이 많이 _____ .</b>", 
      answer: "G", 
      why: "직접 보진 않았지만(확신 부족), '금요일 저녁'이라는 일반적 패턴(상식)으로 미루어 짐작하므로 '-을 것 같아요'가 적절합니다." 
    },
    { 
      id: 13, 
      context: "지금 몇 시인지 시계를 안 봐서 정확히 모릅니다. 하지만 해가 진 것을 보니 대충 저녁인 것 같아요.<br>→ <b>아마 7시는 _____ .</b>", 
      answer: "K", 
      why: "시계(객관적 수치)를 확인하지 않았고, 단순히 감각에 의존한 막연한 추측이므로 '-을걸요(넘었을걸요)'가 적절합니다." 
    },
    { 
      id: 14, 
      context: "저기 정장을 입고 서류 가방을 든 사람이 지나갑니다. 직업을 모르지만 외관상 추측해 봅니다.<br>→ <b>저 사람은 회사원 _____ .</b>", 
      answer: "G", 
      why: "옷차림이라는 시각적 단서를 통해 보편적인 판단(일반적 추정)을 하고 있으므로 '-일 것 같아요'가 적절합니다." 
    },
    { 
      id: 15, 
      context: "친구가 '이번 시험 어려울까?'라고 걱정합니다. 선생님이 힌트를 안 주셔서 아무 정보가 없지만, 친구를 안심시키고 싶어요.<br>→ <b>아마 별로 어렵지 _____ .</b>", 
      answer: "K", 
      why: "시험 난이도에 대한 정보가 전혀 없는 상태입니다. 근거 없이 막연하게 추측하거나 희망 섞인 예상을 할 때는 '-을걸요(않을걸요)'를 씁니다." 
    }
  ];

  const choicesData = [
    { key: "T", label: "텐데요 (강한 근거)" },
    { key: "G", label: "것 같아요 (일반 추측)" },
    { key: "K", label: "걸요 (약한 추측)" }
  ];

  let idx = 0;
  let score = 0;
  let answered = new Array(items.length).fill(null);

  // DOM Elements
  const els = {
    card: document.getElementById('quizCard'),
    num: document.getElementById('qNum'),
    ctx: document.getElementById('qContext'),
    choices: document.getElementById('choices'),
    feedback: document.getElementById('feedback'),
    resTitle: document.getElementById('resTitle'),
    explain: document.getElementById('explain'),
    score: document.getElementById('scoreText'),
    total: document.getElementById('totalCount'),
    bar: document.getElementById('progressBar'),
    prev: document.getElementById('prevBtn'),
    next: document.getElementById('nextBtn'),
    reset: document.getElementById('resetBtn')
  };

  function render() {
    const item = items[idx];
    const userAns = answered[idx];
    
    // Header Info
    els.num.textContent = `문제 ${idx + 1} / ${items.length}`;
    els.score.textContent = score;
    els.total.textContent = `/ ${items.length} 문제`;
    els.bar.style.width = `${((answered.filter(x=>x).length) / items.length) * 100}%`;

    // Context formatting
    els.ctx.innerHTML = item.context.replace("_____", `<span class="blank">_____</span>`);

    // Reset UI state
    els.choices.innerHTML = "";
    els.feedback.style.display = "none";
    els.card.style.borderColor = "var(--border)";

    // Controls
    els.prev.disabled = idx === 0;
    els.next.disabled = idx === items.length - 1;

    // Generate Choices
    choicesData.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "btn-choice";
      btn.innerHTML = `<span>-${c.label}</span>`;
      
      if (userAns) {
        btn.disabled = true;
        if (c.key === item.answer) {
          btn.classList.add("correct");
          btn.innerHTML += `<span>✅ 정답</span>`;
        }
        else if (c.key === userAns) {
          btn.classList.add("wrong");
          btn.innerHTML += `<span>❌ 선택</span>`;
        }
      } else {
        btn.onclick = () => checkAnswer(c.key);
      }
      els.choices.appendChild(btn);
    });

    // Show Feedback if answered
    if (userAns) {
      els.feedback.style.display = "block";
      const isCorrect = userAns === item.answer;
      
      if (isCorrect) {
        els.resTitle.innerHTML = `<span class="txt-success">✨ 정답입니다!</span>`;
        els.card.style.borderColor = "var(--success)";
      } else {
        els.resTitle.innerHTML = `<span class="txt-error">오답입니다.</span>`;
        els.card.style.borderColor = "var(--error)";
      }
      els.explain.textContent = item.why;
    }
  }

  function checkAnswer(key) {
    answered[idx] = key;
    if (key === items[idx].answer) score++;
    render();
  }

  function move(step) {
    if (idx + step >= 0 && idx + step < items.length) {
      idx += step;
      render();
    }
  }

  function reset() {
    idx = 0; score = 0;
    answered.fill(null);
    render();
  }

  els.prev.onclick = () => move(-1);
  els.next.onclick = () => move(1);
  els.reset.onclick = reset;

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key === "ArrowLeft") move(-1);
    if (e.key === "ArrowRight") move(1);
  });

  render();
})();
</script>
</body>
</html>
