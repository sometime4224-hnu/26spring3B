<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?쒖꽌 ?욊린 ??/title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            touch-action: manipulation;
            background-color: #f8fafc;
        }

        .student-card {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .student-card:active {
            transform: scale(0.95);
        }

        .student-card.fixed-student {
            background-color: #e0e7ff;
            border-color: #818cf8;
            color: #4338ca;
        }

        /* Animation Styles */
        .shuffling-name {
            position: absolute;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform, top, left;
            padding: 0.75rem 1.5rem;
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.2);
            border: 2px solid #e0e7ff;
            font-weight: 800;
            color: #4f46e5;
            z-index: 10;
        }

        .particle {
            position: absolute;
            background: #4f46e5;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            animation: explode 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 20;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="../../assets/content-consistency.css">
</head>

<body class="flex flex-col items-center min-h-screen">

    <!-- Global Navigation -->
    <nav
        class="w-full bg-white/80 backdrop-blur-md border-b border-indigo-100 sticky top-0 z-50 shadow-sm h-16 px-4 sm:px-6 flex items-center shrink-0">
        <a href="../index.html"
            class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-bold transition-colors">
            <i class="fa-solid fa-house"></i>
            <span>硫붿씤?쇰줈</span>
        </a>
    </nav>

    <div class="flex-1 w-full max-w-4xl mx-auto p-4 flex flex-col justify-center relative">
        <div id="app-container"
            class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] ring-1 ring-slate-100 p-6 sm:p-10 text-center relative z-10 w-full">

            <!-- Initial Screen -->
            <div id="initial-screen" class="w-full transition-all duration-500">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-600 mb-4">
                    <i class="fa-solid fa-shuffle text-2xl"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight mb-2">?쒖꽌 ?욊린</h1>
                <p class="text-slate-500 font-medium mb-8">紐⑤뱺 ?숈깮???쒖꽌瑜?臾댁옉?꾨줈 ?щ같移섑빀?덈떎.</p>

                <button id="shuffle-btn"
                    class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-12 rounded-2xl text-lg transition-all active:scale-95 shadow-lg shadow-indigo-200 mb-10 flex items-center justify-center gap-2 mx-auto">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> ?묐룞 ?쒖옉
                </button>

                <div class="text-left mb-2 text-xs font-bold text-slate-400 uppercase tracking-widest px-2">??곸옄 紐⑸줉</div>
                <div id="student-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                    <!-- ?숈깮 紐⑸줉???ш린???앹꽦?⑸땲??-->
                </div>
            </div>

            <!-- Result Screen -->
            <div id="result-screen" class="hidden w-full transition-all duration-500">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-50 text-emerald-500 mb-4">
                    <i class="fa-solid fa-check-double text-2xl"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight mb-8">寃곗젙???쒖꽌!</h1>

                <div id="result-list"
                    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 text-left">
                    <!-- 寃곌낵 紐⑸줉???ш린???앹꽦?⑸땲??-->
                </div>

                <button id="reset-btn"
                    class="mt-10 w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-10 rounded-2xl text-lg transition-all active:scale-95 shadow-lg shadow-slate-300 mx-auto flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate-left"></i> 泥섏쓬?쇰줈 ?뚯븘媛湲?                </button>
            </div>
        </div>

        <!-- Animation Container -->
        <div id="animation-container" class="absolute inset-0 pointer-events-none z-0"></div>
    </div>

    <script>
        const students = [
            "吏???肄?, "? ??誘???, "?묒쎂 諛???, "?묒쎂 ?묒뼲 留덉씠", "荑좎뾿諛섑깢",
            "?묒쎂 ???묒쎔 ?묒븘", "?묒슦??誘??덉뿉??, "?묒쎂 ?곗뿏 ??, "?묒쎂?고??됱㎟", "?묒쎂 ?붿뿏 ??,
            "??袁몄삦 ??, "蹂??ㅼ븞 ???, "踰???袁몄엵", "吏???援ъ씤 ?꾩뿁", "?꾩엵 ??袁몄뼲 ??,
            "姨먯븘?됱쫰??, "?묒쎂 鍮꾩뿣 袁몄뼲", "??遺 ??, "?묒슦????吏??, "吏???罹?由?,
            "?????꾩뿏 吏?, "易붿뿁?고???
        ];

        let fixedStudents = [];

        const appContainer = document.getElementById('app-container');
        const initialScreen = document.getElementById('initial-screen');
        const resultScreen = document.getElementById('result-screen');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const resetBtn = document.getElementById('reset-btn');
        const studentListContainer = document.getElementById('student-list');
        const resultListContainer = document.getElementById('result-list');
        const animationContainer = document.getElementById('animation-container');

        function initialize() {
            studentListContainer.innerHTML = '';
            fixedStudents = [];
            students.forEach(name => {
                const card = document.createElement('div');
                card.textContent = name;
                card.className = 'student-card bg-white border border-slate-200 p-3 sm:p-4 rounded-xl text-slate-600 font-bold text-sm sm:text-base text-center shadow-sm';
                card.onclick = () => {
                    if (fixedStudents.includes(name)) {
                        fixedStudents = fixedStudents.filter(s => s !== name);
                        card.classList.remove('fixed-student');
                    } else {
                        fixedStudents.push(name);
                        card.classList.add('fixed-student');
                    }
                };
                studentListContainer.appendChild(card);
            });
            initialScreen.classList.remove('hidden', 'opacity-0', 'scale-95');
            initialScreen.classList.add('opacity-100', 'scale-100');
            resultScreen.classList.add('hidden', 'opacity-0', 'scale-95');
            resultScreen.classList.remove('opacity-100', 'scale-100');

            appContainer.classList.remove('ring-emerald-100', 'shadow-emerald-100');
        }

        shuffleBtn.addEventListener('click', () => {
            const remainingStudents = students.filter(s => !fixedStudents.includes(s));
            const shuffledStudents = remainingStudents.sort(() => Math.random() - 0.5);
            const finalOrder = [...fixedStudents, ...shuffledStudents];

            runAnimation(finalOrder);
        });

        resetBtn.addEventListener('click', initialize);

        function runAnimation(finalOrder) {
            initialScreen.classList.remove('opacity-100', 'scale-100');
            initialScreen.classList.add('opacity-0', 'scale-95');
            setTimeout(() => initialScreen.classList.add('hidden'), 500);

            animationContainer.innerHTML = '';

            const animatedNames = [];
            const rect = appContainer.getBoundingClientRect();

            students.forEach(name => {
                const el = document.createElement('div');
                el.textContent = name;
                el.className = 'shuffling-name';
                el.style.top = `${rect.top + Math.random() * (rect.height - 80)}px`;
                el.style.left = `${rect.left + Math.random() * (rect.width - 150)}px`;
                animationContainer.appendChild(el);
                animatedNames.push(el);
            });

            // 1. Shuffling effect
            let shuffleInterval = setInterval(() => {
                animatedNames.forEach(el => {
                    el.style.top = `${rect.top + Math.random() * (rect.height - 80)}px`;
                    el.style.left = `${rect.left + Math.random() * (rect.width - 150)}px`;
                    el.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
                });
            }, 400);

            // 2. Gather effect
            setTimeout(() => {
                clearInterval(shuffleInterval);
                const centerX = rect.left + rect.width / 2 - 75;
                const centerY = rect.top + rect.height / 2 - 25;
                animatedNames.forEach(el => {
                    el.style.transition = 'all 0.6s cubic-bezier(0.87, 0, 0.13, 1)';
                    el.style.top = `${centerY}px`;
                    el.style.left = `${centerX}px`;
                    el.style.transform = `scale(0.5) rotate(0deg)`;
                    el.style.opacity = '0';
                });
            }, 2000);

            // 3. Explosion effect
            setTimeout(() => {
                animatedNames.forEach(el => el.remove());
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                const colors = ['#4f46e5', '#818cf8', '#10b981', '#f59e0b', '#ec4899'];
                for (let i = 0; i < 60; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.top = `${centerY}px`;
                    particle.style.left = `${centerX}px`;
                    const angle = Math.random() * 360;
                    const distance = Math.random() * 250 + 50;
                    particle.style.setProperty('--x', `${Math.cos(angle * Math.PI / 180) * distance}px`);
                    particle.style.setProperty('--y', `${Math.sin(angle * Math.PI / 180) * distance}px`);
                    animationContainer.appendChild(particle);
                }
            }, 2600);

            // 4. Show results
            setTimeout(() => {
                animationContainer.innerHTML = '';
                appContainer.classList.add('ring-emerald-100', 'shadow-emerald-100');
                displayResults(finalOrder);
            }, 3000);
        }

        function displayResults(order) {
            resultListContainer.innerHTML = '';
            order.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'bg-slate-50 border border-slate-200 p-3 rounded-xl flex items-center gap-3 shadow-sm hover:shadow-md transition-shadow animate-[popIn_0.4s_ease-out_forwards] opacity-0 scale-90';
                item.style.animationDelay = `${index * 0.05}s`;
                item.innerHTML = `
                    <span class="bg-indigo-100 text-indigo-600 font-black w-7 h-7 rounded-lg flex items-center justify-center text-xs shrink-0">${index + 1}</span>
                    <span class="text-slate-800 font-bold text-[15px] truncate">${name}</span>
                `;
                resultListContainer.appendChild(item);
            });

            resultScreen.classList.remove('hidden');
            setTimeout(() => {
                resultScreen.classList.remove('opacity-0', 'scale-95');
                resultScreen.classList.add('opacity-100', 'scale-100');
            }, 10);
        }

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.ctrlKey && ['s', 'u', 'p'].includes(event.key.toLowerCase())) {
                event.preventDefault();
            }
            if (event.key === 'F12') {
                event.preventDefault();
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes popIn {
                to { opacity: 1; transform: scale(1); }
            }
        `;
        document.head.appendChild(style);

        initialize();
    </script>
</body>

</html>
