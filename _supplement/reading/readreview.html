            { type: "p", html: `癒쇱? ?앹꽟 ?쒓컯怨듭썝??媛硫??믪씠媛 ?ㅻⅨ ?ㅻえ 紐⑥뼇???명뎮遺덊뎮??踰쎌쓣 蹂????덈뒗??洹멸쾶 諛붾줈 ?멸났 ?붾꼍?μ씠?? <span class="inline-flex items-center gap-2 align-middle"><span class="text-xs font-bold text-slate-500">(1)</span><span data-blank="16-1"></span></span>. ?댁슜 ?쒓컙? ?깆닔湲?3~11???먮뒗 ?ㅼ쟾 9?쒕????ㅽ썑 9?쒓퉴吏, 鍮꾩닔湲?12~2???먮뒗 ?ㅼ쟾 9?쒕????ㅽ썑 5?쒓퉴吏?대떎.` },
            { type: "p", html: `愿묐굹猷??쒓컯怨듭썝?먯꽌???먯쟾嫄곗? ?덉씪諛붿씠?щ? 利먭만 ???덈떎. ?먯쟾嫄??댁슜 ?붽툑? 20遺꾩뿉 1,000?먯씠怨? 留?6??誘몃쭔 ?대┛?대뒗 臾대즺?? ?덉씪諛붿씠?щ뒗 ??10遺??숈븞 ?????덈뒗 湲몄씠?몃뜲 <span class="inline-flex items-center gap-2 align-middle"><span class="text-xs font-bold text-slate-500">(2)</span><span data-blank="16-2"></span></span>. 珥?10?媛 留덈젴???덉쑝硫??댁슜 ?붽툑? 2,000?먯씠??` }

          blanks: [

              accept: [
                /(臾대즺).*(?댁슜).*(諛곗슱|諛곗슦).*(?붾꼍|?깅컲)/i,
                /(?붾꼍|?깅컲).*(臾대즺).*(諛곗슱|諛곗슦).*(臾대즺).*(?댁슜)/i
              ],
              tokens: ["臾대즺", "?댁슜"],
              cueK: "?멸났 ?붾꼍?μ? ?덉쓣 ?댁빞 ?섎굹?? ??臾댁뾿???????덈굹??",
              cueV: "C처 ph梳즜 tr梳?ti沼걆 kh척ng? V횪 c처 th沼?l횪m/h沼뛠 g챙?",
              helpK: "?듭떖 ?⑥뼱: ?섎Т猷뚢?+ ?섏씠?⒱?+ ?섎같?????덈떎(?붾꼍 ?깅컲)??",
              helpV: "T沼?kh처a: ?쐌i沼꿳 ph챠??+ ?쐓沼?d沼쩸g??+ ?쐁처 th沼?h沼뛠 (leo n첬i)??"
            },
            {
              id: "16-2",
              inputType: "textarea",
              placeholder: "?? 醫뚯꽍 ?ъ씠????洹몃옒??媛議깅룄 ??,
              correct: "2?몄슜 醫뚯꽍 ?ъ씠???묒? ?섏옄媛 ?덉뼱???대┛?댁? ?④퍡 ??媛議깅룄 ?댁슜??留뚰븯??,
              accept: [
                /(醫뚯꽍).*(?ъ씠).*(?묒?).*(?섏옄).*(媛議??대┛??/i,
                /(?묒?).*(?섏옄).*(?꾩씠|?대┛??.*(?④퍡).*(???댁슜)/i
              ],
              tokens: ["?섏옄"],
              cueK: "?덉씪諛붿씠?щ뒗 ??媛議깆씠 ?湲?醫뗫굹??",
              cueV: "V챙 sao rail bike ph첫 h沼즤 cho gia 휃챙nh?",
              helpK: "?댁쑀???섏쥖???ъ씠 ?묒? ?섏옄?숈엯?덈떎. 洹몃옒???섏뼱由곗씠+媛議기숈씠 媛?ν빀?덈떎.",
              helpV: "L첵 do: c처 gh梳?nh沼?gi沼칊 2 gh梳???gia 휃챙nh c처 tr梳?em c크ng d첫ng 휃튼沼즓."
            }
          ]

      ];

      // UI elements
      const passageArea = document.getElementById("passageArea");
      const cueArea = document.getElementById("cueArea");
      const lessonTitle = document.getElementById("lessonTitle");
      const progressLabel = document.getElementById("progressLabel");
      const progressBar = document.getElementById("progressBar");
      const scoreLabel = document.getElementById("scoreLabel");
      const summaryArea = document.getElementById("summaryArea");
      const summaryText = document.getElementById("summaryText");
      const summaryTextVn = document.getElementById("summaryTextVn");
      const toggleVn = document.getElementById("toggleVn");
      const strategyVn = document.getElementById("strategyVn");

      const btnPrev = document.getElementById("btnPrev");
      const btnNext = document.getElementById("btnNext");
      const btnGradeTop = document.getElementById("btnGradeTop");
      const mPrev = document.getElementById("mPrev");
      const mNext = document.getElementById("mNext");
      const mGrade = document.getElementById("mGrade");

      const btnReset = document.getElementById("btnReset");
      const btnCopy = document.getElementById("btnCopy");
      const btnToggleAll = document.getElementById("btnToggleAll");

      const tabBtns = [...document.querySelectorAll(".tabBtn")];

      let state = {
        step: 0,
        showVn: false,
        answers: {} // blankId -> string
      };

      const loadState = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") state = { ...state, ...parsed };
        } catch (_) { }
      };

      const saveState = () => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) { }
      };

      const autoResize = (ta) => {
        ta.style.height = "auto";
        ta.style.height = Math.max(ta.scrollHeight, 44) + "px";
      };

      const makeInput = (blank) => {
        const val = state.answers[blank.id] ?? "";
        const commonCls =
          "w-full md:w-[min(520px,100%)] rounded-xl border border-slate-200 bg-white px-3 py-2 " +
          "focus:outline-none focus:ring-2 focus:ring-slate-900/20 focus:border-slate-300 " +
          "placeholder:text-slate-400 text-[15px] leading-6";

        let el;
        if (blank.inputType === "textarea") {
          el = document.createElement("textarea");
          el.rows = 2;
          el.className = commonCls + " min-h-[44px] resize-none";
          el.placeholder = blank.placeholder;
          el.value = val;
          el.addEventListener("input", () => {
            state.answers[blank.id] = el.value;
            saveState();
            autoResize(el);
          });
          setTimeout(() => autoResize(el), 0);
        } else {
          el = document.createElement("input");
          el.type = "text";
          el.className = commonCls + " h-[44px]";
          el.placeholder = blank.placeholder;
          el.value = val;
          el.addEventListener("input", () => {
            state.answers[blank.id] = el.value;
            saveState();
          });
          el.addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") gradeCurrent();
          });
        }

        el.setAttribute("data-blank-input", blank.id);
        return el;
      };

      const renderPassage = (lesson) => {
        passageArea.innerHTML = "";
        lesson.passageParts.forEach(part => {
          const p = document.createElement("p");
          p.className = "text-slate-900";
          p.innerHTML = part.html;

          // Replace placeholder spans with input controls
          const targets = p.querySelectorAll("[data-blank]");
          targets.forEach(t => {
            const id = t.getAttribute("data-blank");
            const blank = lesson.blanks.find(b => b.id === id);
            if (!blank) return;

            const wrap = document.createElement("span");
            wrap.className = "inline-block align-middle w-full md:w-auto";

            const inputEl = makeInput(blank);
            wrap.appendChild(inputEl);
            t.replaceWith(wrap);
          });

          passageArea.appendChild(p);
        });
      };

      const renderCues = (lesson) => {
        cueArea.innerHTML = "";
        lesson.blanks.forEach((b, idx) => {
          const card = document.createElement("div");
          card.className = "rounded-2xl border border-slate-200 bg-white p-4";

          const header = document.createElement("div");
          header.className = "flex items-start justify-between gap-3";

          const left = document.createElement("div");
          left.innerHTML = `
        <div class="text-sm font-bold">鍮덉뭏 (${idx + 1})</div>
        <div class="mt-1 text-sm text-slate-700">${b.cueK}</div>
        <div class="mt-1 text-sm text-slate-600 vnLine ${state.showVn ? "" : "hidden"}">${b.cueV}</div>
      `;

          const right = document.createElement("div");
          right.className = "flex gap-2";
          right.innerHTML = `
        <button class="btnHint px-3 py-2 rounded-xl border bg-white hover:bg-slate-50 text-sm font-semibold" data-id="${b.id}">
          ?뚰듃
        </button>
        <button class="btnAnswer px-3 py-2 rounded-xl bg-slate-900 text-white hover:opacity-90 text-sm font-semibold" data-id="${b.id}">
          ?뺣떟
        </button>
      `;

          header.appendChild(left);
          header.appendChild(right);

          const detail = document.createElement("div");
          detail.className = "mt-3 hidden";
          detail.setAttribute("data-detail", b.id);
          detail.innerHTML = `
        <div class="rounded-xl bg-slate-50 border border-slate-200 p-3">
          <div class="text-sm font-semibold text-slate-800">?뚰듃(?ъ슫 ?쒓뎅??</div>
          <div class="mt-1 text-sm text-slate-700">${b.helpK}</div>
          <div class="mt-2 text-sm text-slate-600 vnLine ${state.showVn ? "" : "hidden"}"><span class="font-semibold text-slate-700">G沼즜 첵 (VN)</span><br>${b.helpV}</div>
        </div>
      `;

          const answer = document.createElement("div");
          answer.className = "mt-3 hidden";
          answer.setAttribute("data-answer", b.id);
          answer.innerHTML = `
        <div class="rounded-xl bg-white border border-slate-200 p-3">
          <div class="text-sm font-semibold text-slate-800">?먮Ц ?뺣떟(李멸퀬)</div>
          <div class="mt-1 text-sm text-slate-700">${b.correct}</div>
          <div class="mt-2 text-xs text-slate-500">?좎궗 ?쒗쁽???섎?媛 媛숈쑝硫??뺣떟?쇰줈 泥섎━?????덉뒿?덈떎.</div>
        </div>
      `;

          card.appendChild(header);
          card.appendChild(detail);
          card.appendChild(answer);

          cueArea.appendChild(card);
        });

        // Bind buttons
        cueArea.querySelectorAll(".btnHint").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            const el = cueArea.querySelector(`[data-detail="${id}"]`);
            if (!el) return;
            el.classList.toggle("hidden");
          });
        });

        cueArea.querySelectorAll(".btnAnswer").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            const el = cueArea.querySelector(`[data-answer="${id}"]`);
            if (!el) return;
            el.classList.toggle("hidden");
          });
        });
      };

      const setTabs = (step) => {
        tabBtns.forEach(btn => {
          const s = Number(btn.getAttribute("data-step"));
          if (s === step) {
            btn.className = "tabBtn px-3 py-2 rounded-xl border bg-slate-900 text-white text-sm font-semibold";
          } else {
            btn.className = "tabBtn px-3 py-2 rounded-xl border bg-white hover:bg-slate-50 text-sm font-semibold";
          }
        });
      };

      const render = () => {
        const lesson = lessons[state.step];
        lessonTitle.textContent = lesson.title;

        const pct = ((state.step + 1) / lessons.length) * 100;
        progressBar.style.width = pct.toFixed(2) + "%";
        progressLabel.textContent = `吏꾪뻾: ${lesson.id}怨?;

        setTabs(state.step);

        // VN toggle
        toggleVn.checked = !!state.showVn;
        strategyVn.classList.toggle("hidden", !state.showVn);
        summaryTextVn.classList.toggle("hidden", !state.showVn);

        renderPassage(lesson);
        renderCues(lesson);

        // Hide summary when switching
        summaryArea.classList.add("hidden");
        scoreLabel.textContent = "?먯닔: -";

        // Enable/disable prev/next
        const isFirst = state.step === 0;
        const isLast = state.step === lessons.length - 1;
        btnPrev.disabled = isFirst;
        mPrev.disabled = isFirst;
        btnPrev.classList.toggle("opacity-50", isFirst);
        mPrev.classList.toggle("opacity-50", isFirst);

        btnNext.textContent = isLast ? "???꾨즺)" : "?ㅼ쓬(??";
        mNext.textContent = isLast ? "?꾨즺" : "?ㅼ쓬";
      };

      const gradeBlank = (blank, answer) => {
        const a = stripFinalPunct(answer || "");
        if (!a) return { ok: false, empty: true, reasonK: "誘몄엯??, reasonV: "Ch튼a nh梳춑" };

        const aN = normalize(a);
        const cN = normalize(blank.correct);

        if (aN === cN) return { ok: true, exact: true };

        // regex accept
        for (const rx of blank.accept) {
          try {
            if (rx.test(a)) return { ok: true, exact: false };
          } catch (_) { }
        }

        // token accept (loose)
        if (blank.tokens?.length && hasAllTokens(a, blank.tokens)) {
          return { ok: true, exact: false, loose: true };
        }

        // Provide missing token hint
        let missing = [];
        if (blank.tokens?.length) {
          const t = normalize(a);
          missing = blank.tokens.filter(tok => !t.includes(normalize(tok)));
        }

        return {
          ok: false,
          empty: false,
          reasonK: missing.length ? `?듭떖 ?⑥뼱媛 遺議깊빀?덈떎: ${missing.join(", ")}` : "?섎?媛 留욎? ?딆뒿?덈떎",
          reasonV: missing.length ? `Thi梳퓎 t沼?kh처a: ${missing.join(", ")}` : "Ch튼a 휃첬ng 첵"
        };
      };

      const gradeCurrent = () => {
        const lesson = lessons[state.step];
        let total = lesson.blanks.length;
        let correct = 0;

        const linesK = [];
        const linesV = [];

        lesson.blanks.forEach((b, i) => {
          const ans = state.answers[b.id] || "";
          const result = gradeBlank(b, ans);

          if (result.ok) {
            correct += 1;
            linesK.push(`(${i + 1}) ?뺣떟`);
            linesV.push(`(${i + 1}) 휂첬ng`);
          } else if (result.empty) {
            linesK.push(`(${i + 1}) 誘몄엯??);
            linesV.push(`(${i + 1}) Ch튼a nh梳춑`);
          } else {
            linesK.push(`(${i + 1}) ?ㅻ떟: ${result.reasonK}`);
            linesV.push(`(${i + 1}) Sai: ${result.reasonV}`);
          }
        });

        const score = Math.round((correct / total) * 100);
        scoreLabel.textContent = `?먯닔: ${correct}/${total} (${score}??`;

        summaryText.textContent = linesK.join(" 쨌 ");
        summaryTextVn.textContent = linesV.join(" 쨌 ");

        summaryArea.classList.remove("hidden");
        summaryTextVn.classList.toggle("hidden", !state.showVn);

        saveState();
        // Scroll a bit for visibility on mobile
        if (window.innerWidth < 768) {
          summaryArea.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      };

      const gotoStep = (step) => {
        state.step = Math.max(0, Math.min(lessons.length - 1, step));
        saveState();
        render();
      };

      // Copy answers
      const buildAnswerText = () => {
        const parts = [];
        lessons.forEach(lesson => {
          parts.push(`[${lesson.id}怨? ${lesson.title}`);
          lesson.blanks.forEach((b, idx) => {
            const a = (state.answers[b.id] || "").trim().replace(/\s+/g, " ");
            parts.push(`(${idx + 1}) ${a || "(誘몄엯??"}`);
          });
          parts.push("");
        });
        return parts.join("\n");
      };

      // Toggle all hints
      let allExpanded = false;
      const toggleAllHints = () => {
        const lesson = lessons[state.step];
        allExpanded = !allExpanded;
        lesson.blanks.forEach(b => {
          const detail = cueArea.querySelector(`[data-detail="${b.id}"]`);
          if (detail) detail.classList.toggle("hidden", !allExpanded);
        });
        btnToggleAll.textContent = allExpanded ? "?뚰듃 紐⑤몢 ?묎린" : "?뚰듃 紐⑤몢 ?쇱튂湲?;
      };

      // Bind events
      tabBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          gotoStep(Number(btn.getAttribute("data-step")));
        });
      });

      toggleVn.addEventListener("change", () => {
        state.showVn = toggleVn.checked;
        saveState();
        render();
      });

      btnPrev.addEventListener("click", () => gotoStep(state.step - 1));
      btnNext.addEventListener("click", () => {
        if (state.step < lessons.length - 1) gotoStep(state.step + 1);
        else gradeCurrent();
      });

      mPrev.addEventListener("click", () => gotoStep(state.step - 1));
      mNext.addEventListener("click", () => {
        if (state.step < lessons.length - 1) gotoStep(state.step + 1);
        else gradeCurrent();
      });

      btnGradeTop.addEventListener("click", gradeCurrent);
      mGrade.addEventListener("click", gradeCurrent);

      btnReset.addEventListener("click", () => {
        state.answers = {};
        saveState();
        render();
      });

      btnCopy.addEventListener("click", async () => {
        const text = buildAnswerText();
        try {
          await navigator.clipboard.writeText(text);
          alert("蹂듭궗?섏뿀?듬땲??");
        } catch (e) {
          // fallback
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          alert("蹂듭궗?섏뿀?듬땲??");
        }
      });

      btnToggleAll.addEventListener("click", toggleAllHints);

      // Ctrl+Enter grading for textarea too
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "Enter") gradeCurrent();
      });

      // Init
      loadState();
      render();
    })();
  </script>
