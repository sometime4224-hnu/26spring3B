        function startQuiz() {
            currentState = { currentQuestion: 0, score: 0, answers: [] };
            showScreen('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const qData = quizData[currentState.currentQuestion];
            const total = quizData.length;

            document.getElementById('question-count').textContent = `Question ${currentState.currentQuestion + 1}/${total}`;
            document.getElementById('question-text').innerHTML = `${currentState.currentQuestion + 1}. ${qData.question}`;

            const progress = ((currentState.currentQuestion) / total) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-400 hover:bg-indigo-50/50 transition-all font-bold text-slate-700 active:scale-[0.98] shadow-sm flex items-center group";

                btn.onclick = () => submitAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function submitAnswer(selectedIndex) {
            const qData = quizData[currentState.currentQuestion];
            const isCorrect = selectedIndex === qData.correct;

            if (isCorrect) currentState.score += 5;

            currentState.answers.push({
                question: qData.question,
                options: qData.options,
                userAnswer: selectedIndex,
                correctAnswer: qData.correct,
                isCorrect: isCorrect,
                grammar: qData.grammar
            });

            if (currentState.currentQuestion < quizData.length - 1) {
                currentState.currentQuestion++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

            document.getElementById('progress-bar').style.width = '100%';
            saveResult();

            document.getElementById('final-score').textContent = currentState.score;

            if (currentState.score >= 90) msgEl.innerHTML = "??⑦빐?? ?꾨꼍?⑸땲?? ?럦";

            reviewList.innerHTML = '';

            container.innerHTML = '';

            if (history.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-12 bg-slate-50 rounded-2xl border border-slate-100"><i class="fas fa-clock-rotate-left text-4xl mb-3 opacity-50"></i><br><span class="font-bold">?꾩쭅 湲곕줉???놁뒿?덈떎.</span></div>';
            } else {
                history.forEach(record => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm hover:border-indigo-200 transition-colors";

                    let scoreClass = "text-slate-700 bg-slate-100";
                    if (record.score >= 80) scoreClass = "text-emerald-700 bg-emerald-50 border border-emerald-100";
                    else if (record.score < 60) scoreClass = "text-rose-700 bg-rose-50 border border-rose-100";
                    else scoreClass = "text-indigo-700 bg-indigo-50 border border-indigo-100";

                    div.innerHTML = `
                        <div>
                            <p class="text-[15px] font-bold text-slate-800">${record.date}</p>
                            <p class="text-xs text-slate-400 font-bold mt-0.5">Level 3 Test</p>
                        </div>
                        <div class="text-xl font-black px-4 py-2 rounded-xl ${scoreClass}">
                            ${record.score}
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            showScreen('history');
        }
    </script>
</body>

</html>
